#-------------------------------------------------------------------------------
# Workflow configuration
#-------------------------------------------------------------------------------

name: Deploy

on:
  push:               # Run on push
    paths-ignore:     # File patterns to ignore
    - '**.md'         # Ignore changes to *.md files

  pull_request:       # Run on pull-request
    paths-ignore:     # File-patterns to ignore
    - '**.md'         # Ignore changes to *.md files

#-------------------------------------------------------------------------------
# Define application name & version
#-------------------------------------------------------------------------------

env:
  VERSION: "3.2.7"
  QT_VERSION_LINUX: 6.11.1
  QT_VERSION_MACOS: 6.11.1
  QT_VERSION_WINDOWS: 6.11.1
  GRPC_VERSION: 1.78.1
  GRPC_REPO: alex-spataru/gRPC-Builds
  EXECUTABLE: "Serial-Studio-Pro"
  APPLICATION: "Serial Studio Pro"
  UNIXNAME: "serial-studio-pro"
  QML_DIR: "../../app/qml"
  PUBLISHER: "Alex Spataru"
  INSTALL_QT_MACOS: false
  INSTALL_QT_WINDOWS: false
  INSTALL_QT_LINUX_INTEL: false
  INSTALL_QT_LINUX_ARM64: false
  QTFRAMEWORK_BYPASS_LICENSE_CHECK: "true"
  LINUXDEPLOY_EXCLUDED_LIBRARIES: "libmysqlclient.so*;libqsqlmimer.so;libqsqlmysql.so;libqsqlodbc.so;libqsqlpsql.so;libqsqloci.so;libqsqldb2.so;libqsqlibase.so"
  DESCRIPTION: "Multi-purpose serial data visualization & processing program"

#-------------------------------------------------------------------------------
# Begin workflow jobs definition
#-------------------------------------------------------------------------------

jobs:

#-------------------------------------------------------------------------------
# GNU/Linux build (x86_64)
#-------------------------------------------------------------------------------

  build-linux:
    runs-on: ubuntu-24.04
    name: '🐧 Linux'
    permissions:
      contents: read
      security-events: write
    steps:
    - name: '🧰 Checkout'
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: '⚙️ Install dependencies'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          fakeroot \
          libcups2-dev \
          libegl1 \
          libfuse2 \
          libgl1-mesa-dev \
          libasound2-dev \
          libssl-dev \
          libudev-dev \
          libsecret-1-dev \
          libzstd-dev \
          zlib1g-dev \
          libexpat1-dev \
          libminizip-dev \
          libopus-dev \
          rpm \
          libxcb1 \
          libxcb-cursor0 \
          libxcb-cursor-dev \
          libxcb-glx0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-image0-dev \
          libxcb-keysyms1 \
          libxcb-randr0 \
          libxcb-render0 \
          libxcb-render-util0 \
          libxcb-shape0 \
          libxcb-shm0 \
          libxcb-sync1 \
          libxcb-util0-dev \
          libxcb-util1 \
          libxcb-xfixes0 \
          libxcb-xinerama0 \
          libxcb-xkb-dev \
          libxcb-xtest0 \
          libxkbcommon-dev \
          libxkbcommon-x11-0 \
          libxkbcommon-x11-dev \
          libpulse-dev \
          libpipewire-0.3-0 \
          libgstreamer1.0-0 \
          libgstreamer-plugins-base1.0-0 \
          libgstreamer-plugins-bad1.0-0 \
          libgstreamer-plugins-good1.0-0 \
          libgstreamer-gl1.0-0 \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          gstreamer1.0-plugins-bad \
          gstreamer1.0-plugins-ugly \
          gstreamer1.0-libav \
          gstreamer1.0-tools \
          gstreamer1.0-x \
          gstreamer1.0-alsa \
          gstreamer1.0-pulseaudio \
          gstreamer1.0-gl \
          
    - name: '⚙️ Download prebuilt gRPC'
      run: |
        gh release download v${{env.GRPC_VERSION}} \
          -R ${{env.GRPC_REPO}} \
          -p "grpc-${{env.GRPC_VERSION}}-linux-x86_64.tar.gz"
        mkdir -p ${{github.workspace}}/grpc-prefix
        tar -xzf grpc-${{env.GRPC_VERSION}}-linux-x86_64.tar.gz -C ${{github.workspace}}/grpc-prefix
      env:
        GH_TOKEN: ${{secrets.GITHUB_TOKEN}}

    - name: '⚙️ Restore Qt Cache'
      uses: actions/cache/restore@v5
      if: env.INSTALL_QT_LINUX_INTEL == 'false'
      with:
        path: |
          ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64
          ${{env.USERPROFILE}}/.qt-license
        key: qt-${{runner.os}}-${{env.QT_VERSION_LINUX}}-x64

    - name: '⚙️ Install Qt'
      shell: bash
      if: env.INSTALL_QT_LINUX_INTEL == 'true'
      env:
        QT_VERSION: ${{env.QT_VERSION_LINUX}}
        QT_ARCH: x64
        QT_USERNAME: ${{secrets.QT_USERNAME}}
        QT_PASSWORD: ${{secrets.QT_PASSWORD}}
        QT_OUTPUT_DIR: ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64
      run: |
        chmod +x ./scripts/install-qt.sh
        ./scripts/install-qt.sh

    - name: '⚙️ Save Qt Cache'
      if: env.INSTALL_QT_LINUX_INTEL == 'true'
      uses: actions/cache/save@v5
      with:
        path: |
          ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64
          ${{env.USERPROFILE}}/.qt-license
        key: qt-${{runner.os}}-${{env.QT_VERSION_LINUX}}-x64

    - name: '⚙️ Add Qt to PATH'
      shell: bash
      env:
        QT_VERSION: ${{env.QT_VERSION_LINUX}}
        QT_OUTPUT_DIR: ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64
      run: |
        export QT_BIN_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/gcc_64/bin"
        export QT_LIBEXEC_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/gcc_64/libexec"
        export CMAKE_PREFIX_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/gcc_64/lib/cmake"

        echo "$QT_BIN_PATH" >> $GITHUB_PATH
        echo "$QT_LIBEXEC_PATH" >> $GITHUB_PATH
        echo "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH" >> $GITHUB_ENV

    - name: '⚙️ Install CMake'
      uses: lukka/get-cmake@latest
      with:
        useLocalCache: true

    # PGO stage 1 (GENERATE): instrumented build. The instrumented binary is
    # slower; it exists only to emit profile data during the training run below.
    # We never ship it and never gate on its throughput.
    - name: '🚧 Configure with CMake (PGO generate)'
      env:
        ARCGIS_API_KEY: ${{secrets.ARCGIS_API_KEY}}
        SERIAL_STUDIO_LICENSE_KEY: ${{secrets.SERIAL_STUDIO_LICENSE_KEY}}
        SERIAL_STUDIO_INSTANCE_ID: ${{secrets.SERIAL_STUDIO_INSTANCE_ID}}
      run: |
        cmake -B build \
          -DPRODUCTION_OPTIMIZATION=ON \
          -DENABLE_HARDENING=ON \
          -DENABLE_GRPC=ON \
          -DENABLE_PGO=ON \
          -DPGO_STAGE=GENERATE \
          -DUSE_SYSTEM_ZLIB=ON \
          -DUSE_SYSTEM_EXPAT=ON \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="${{github.workspace}}/grpc-prefix;${CMAKE_PREFIX_PATH}" \
          -DBUILD_COMMERCIAL=ON \
          -DBUILD_GPL3=OFF

    - name: '🚧 Build application (instrumented)'
      run: cmake --build build --config Release -j 16

    # PGO training workload. Drives the frame-extraction hotpath hard so the
    # instrumented binary writes representative profile data (.gcda for GCC).
    # --min-fps 1 keeps this step green regardless of instrumented overhead;
    # the real 256 kHz threshold is enforced on the optimized binary below.
    - name: '🏋️ PGO training run (hotpath)'
      env:
        QT_QPA_PLATFORM: offscreen
        LD_LIBRARY_PATH: >-
          ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64/${{env.QT_VERSION_LINUX}}/gcc_64/lib
      run: |
        ./build/app/${{env.UNIXNAME}} --headless --benchmark-hotpath --min-fps 1 --benchmark-frames 8000000

    # PGO stage 3 (USE): rebuild the same tree consuming the profile data.
    - name: '🚧 Reconfigure with CMake (PGO use)'
      env:
        ARCGIS_API_KEY: ${{secrets.ARCGIS_API_KEY}}
        SERIAL_STUDIO_LICENSE_KEY: ${{secrets.SERIAL_STUDIO_LICENSE_KEY}}
        SERIAL_STUDIO_INSTANCE_ID: ${{secrets.SERIAL_STUDIO_INSTANCE_ID}}
      run: |
        cmake -B build \
          -DPRODUCTION_OPTIMIZATION=ON \
          -DENABLE_HARDENING=ON \
          -DENABLE_GRPC=ON \
          -DENABLE_PGO=ON \
          -DPGO_STAGE=USE \
          -DUSE_SYSTEM_ZLIB=ON \
          -DUSE_SYSTEM_EXPAT=ON \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="${{github.workspace}}/grpc-prefix;${CMAKE_PREFIX_PATH}" \
          -DBUILD_COMMERCIAL=ON \
          -DBUILD_GPL3=OFF

    - name: '🚧 Build application (PGO optimized)'
      run: cmake --build build --config Release -j 16

    # Hard gate: the shipped PGO binary must sustain >= 256 kHz on the
    # frame-extraction hotpath. A nonzero exit fails this job, so the `upload`
    # job (needs: build-linux) is skipped and no release is published.
    - name: '🚦 Hotpath throughput gate (256 kHz)'
      env:
        QT_QPA_PLATFORM: offscreen
        LD_LIBRARY_PATH: >-
          ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64/${{env.QT_VERSION_LINUX}}/gcc_64/lib
      run: |
        ./build/app/${{env.UNIXNAME}} --headless --benchmark-hotpath --min-fps 256000

    - name: '🔎 Scan binaries with deglyph'
      uses: deglyph-re/cli@main
      with:
        path: build/app/${{env.UNIXNAME}}
        sarif: deglyph.sarif
        fail-on: never
        cve: "true"

    - name: '🛡 Upload deglyph SARIF'
      if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: deglyph.sarif
        category: deglyph-linux-x64

    - name: '📦 Create AppImage'
      run: |
        cd "build/app"
        wget https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20240109-1/linuxdeploy-x86_64.AppImage
        #wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-plugin-qt-x86_64.AppImage

        export QML_SOURCES_PATHS="${{env.QML_DIR}}"

        QT_PLUGINS_PATH="${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64/${{env.QT_VERSION_LINUX}}/gcc_64/plugins"
        rm -f "$QT_PLUGINS_PATH/imageformats/libqtiff.so"

        ./linuxdeploy-x86_64.AppImage --appdir AppDir -e ${{env.UNIXNAME}} -i ../../app/deploy/linux/${{env.UNIXNAME}}.svg -d ../../app/deploy/linux/${{env.UNIXNAME}}.desktop --plugin qt --output appimage
        mkdir -p AppDir/usr/plugins/canbus
        if [ -d "$QT_PLUGINS_PATH/canbus" ]; then
          cp -r "$QT_PLUGINS_PATH/canbus/"* AppDir/usr/plugins/canbus/ || echo "Warning: Could not copy canbus plugins"
        else
          echo "Warning: Qt canbus plugins not found at $QT_PLUGINS_PATH/canbus"
        fi

        ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage

        rm linuxdeploy-x86_64.AppImage
        rm linuxdeploy-plugin-qt-x86_64.AppImage

        mv *.AppImage ../../${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-x64.AppImage

    - name: '✍🏻 Sign Linux artifacts (GPG, optional)'
      env:
        GPG_PRIVATE_KEY: ${{secrets.GPG_PRIVATE_KEY}}
        GPG_PASSPHRASE: ${{secrets.GPG_PASSPHRASE}}
        GPG_KEY_ID: ${{secrets.GPG_KEY_ID}}
      run: |
        set -euo pipefail
        if [ -z "${GPG_KEY_ID:-}" ] || [ -z "${GPG_PRIVATE_KEY:-}" ]; then
          echo "GPG signing secrets not set; skipping Linux signing."
          exit 0
        fi
        printf '%s\n' "$GPG_PRIVATE_KEY" | gpg --batch --import
        APPIMAGE="${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-x64.AppImage"
        BIN="${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-x64"
        cp "build/app/${{env.UNIXNAME}}" "$BIN"
        for f in "$APPIMAGE" "$BIN"; do
          gpg --batch --yes --pinentry-mode loopback \
            ${GPG_PASSPHRASE:+--passphrase "$GPG_PASSPHRASE"} \
            --local-user "$GPG_KEY_ID" \
            --detach-sign --armor --output "$f.asc" "$f"
          gpg --verify "$f.asc" "$f"
        done

    - name: '📤 Upload artifact: AppImage'
      uses: actions/upload-artifact@v5
      with:
        name: ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-x64.AppImage
        path: ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-x64.AppImage

    - name: '📤 Upload artifact: signatures + signed binary (x64)'
      uses: actions/upload-artifact@v5
      with:
        name: ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-x64-signed
        if-no-files-found: ignore
        path: |
          ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-x64.AppImage.asc
          ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-x64
          ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-x64.asc

#-------------------------------------------------------------------------------
# GNU/Linux build (aarch64)
#-------------------------------------------------------------------------------

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    name: '🐧 Linux (arm64)'
    permissions:
      contents: read
      security-events: write
    steps:
    - name: '🧰 Checkout'
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: '⚙️ Install dependencies'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          fakeroot \
          libcups2-dev \
          libegl1 \
          libfuse2 \
          libgl1-mesa-dev \
          libasound2-dev \
          libssl-dev \
          libudev-dev \
          libsecret-1-dev \
          libzstd-dev \
          zlib1g-dev \
          libexpat1-dev \
          libminizip-dev \
          libopus-dev \
          rpm \
          libxcb1 \
          libxcb-cursor0 \
          libxcb-cursor-dev \
          libxcb-glx0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-image0-dev \
          libxcb-keysyms1 \
          libxcb-randr0 \
          libxcb-render0 \
          libxcb-render-util0 \
          libxcb-shape0 \
          libxcb-shm0 \
          libxcb-sync1 \
          libxcb-util0-dev \
          libxcb-util1 \
          libxcb-xfixes0 \
          libxcb-xinerama0 \
          libxcb-xkb-dev \
          libxcb-xtest0 \
          libxkbcommon-dev \
          libxkbcommon-x11-0 \
          libxkbcommon-x11-dev \
          libpulse-dev \
          libpipewire-0.3-0 \
          libgstreamer1.0-0 \
          libgstreamer-plugins-base1.0-0 \
          libgstreamer-plugins-bad1.0-0 \
          libgstreamer-plugins-good1.0-0 \
          libgstreamer-gl1.0-0 \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          gstreamer1.0-plugins-bad \
          gstreamer1.0-plugins-ugly \
          gstreamer1.0-libav \
          gstreamer1.0-tools \
          gstreamer1.0-x \
          gstreamer1.0-alsa \
          gstreamer1.0-pulseaudio \
          gstreamer1.0-gl \
          
    - name: '⚙️ Download prebuilt gRPC'
      run: |
        gh release download v${{env.GRPC_VERSION}} \
          -R ${{env.GRPC_REPO}} \
          -p "grpc-${{env.GRPC_VERSION}}-linux-aarch64.tar.gz"
        mkdir -p ${{github.workspace}}/grpc-prefix
        tar -xzf grpc-${{env.GRPC_VERSION}}-linux-aarch64.tar.gz -C ${{github.workspace}}/grpc-prefix
      env:
        GH_TOKEN: ${{secrets.GITHUB_TOKEN}}

    - name: '⚙️ Restore Qt Cache'
      uses: actions/cache/restore@v5
      if: env.INSTALL_QT_LINUX_ARM64 == 'false'
      with:
        path: |
          ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-arm64
        key: qt-${{runner.os}}-${{env.QT_VERSION_LINUX}}-arm64

    - name: '⚙️ Install Qt'
      shell: bash
      if: env.INSTALL_QT_LINUX_ARM64 == 'true'
      env:
        QT_VERSION: ${{env.QT_VERSION_LINUX}}
        QT_ARCH: arm64
        QT_USERNAME: ${{secrets.QT_USERNAME}}
        QT_PASSWORD: ${{secrets.QT_PASSWORD}}
        QT_OUTPUT_DIR: ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-arm64
      run: |
        chmod +x ./scripts/install-qt.sh
        ./scripts/install-qt.sh

    - name: '⚙️ Save Qt Cache'
      uses: actions/cache/save@v5
      if: env.INSTALL_QT_LINUX_ARM64 == 'true'
      with:
        path: |
          ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-arm64
        key: qt-${{runner.os}}-${{env.QT_VERSION_LINUX}}-arm64

    - name: '⚙️ Add Qt to PATH'
      shell: bash
      env:
        QT_VERSION: ${{env.QT_VERSION_LINUX}}
        QT_OUTPUT_DIR: ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-arm64
      run: |
        export QT_BIN_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/gcc_arm64/bin"
        export QT_LIBEXEC_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/gcc_arm64/libexec"
        export CMAKE_PREFIX_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/gcc_arm64/lib/cmake"

        echo "$QT_BIN_PATH" >> $GITHUB_PATH
        echo "$QT_LIBEXEC_PATH" >> $GITHUB_PATH
        echo "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH" >> $GITHUB_ENV

    - name: '⚙️ Install CMake'
      uses: lukka/get-cmake@latest
      with:
        useLocalCache: true

    # PGO stage 1 (GENERATE): instrumented build (see build-linux for rationale).
    - name: '🚧 Configure with CMake (PGO generate)'
      env:
        ARCGIS_API_KEY: ${{secrets.ARCGIS_API_KEY}}
        SERIAL_STUDIO_LICENSE_KEY: ${{secrets.SERIAL_STUDIO_LICENSE_KEY}}
        SERIAL_STUDIO_INSTANCE_ID: ${{secrets.SERIAL_STUDIO_INSTANCE_ID}}
      run: |
        cmake -B build \
          -DPRODUCTION_OPTIMIZATION=ON \
          -DENABLE_HARDENING=ON \
          -DENABLE_GRPC=ON \
          -DENABLE_PGO=ON \
          -DPGO_STAGE=GENERATE \
          -DUSE_SYSTEM_ZLIB=ON \
          -DUSE_SYSTEM_EXPAT=ON \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="${{github.workspace}}/grpc-prefix;${CMAKE_PREFIX_PATH}" \
          -DBUILD_COMMERCIAL=ON \
          -DBUILD_GPL3=OFF

    - name: '🚧 Build application (instrumented)'
      run: cmake --build build --config Release -j 16

    # PGO training workload. --min-fps 1 (smoke, not a gate): the authoritative
    # 256 kHz hard gate runs on the x86_64 reference build, not per-platform.
    - name: '🏋️ PGO training run (hotpath)'
      env:
        QT_QPA_PLATFORM: offscreen
        LD_LIBRARY_PATH: >-
          ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-arm64/${{env.QT_VERSION_LINUX}}/gcc_arm64/lib
      run: |
        ./build/app/${{env.UNIXNAME}} --headless --benchmark-hotpath --min-fps 1 --benchmark-frames 8000000

    # PGO stage 3 (USE): rebuild consuming the profile data.
    - name: '🚧 Reconfigure with CMake (PGO use)'
      env:
        ARCGIS_API_KEY: ${{secrets.ARCGIS_API_KEY}}
        SERIAL_STUDIO_LICENSE_KEY: ${{secrets.SERIAL_STUDIO_LICENSE_KEY}}
        SERIAL_STUDIO_INSTANCE_ID: ${{secrets.SERIAL_STUDIO_INSTANCE_ID}}
      run: |
        cmake -B build \
          -DPRODUCTION_OPTIMIZATION=ON \
          -DENABLE_HARDENING=ON \
          -DENABLE_GRPC=ON \
          -DENABLE_PGO=ON \
          -DPGO_STAGE=USE \
          -DUSE_SYSTEM_ZLIB=ON \
          -DUSE_SYSTEM_EXPAT=ON \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="${{github.workspace}}/grpc-prefix;${CMAKE_PREFIX_PATH}" \
          -DBUILD_COMMERCIAL=ON \
          -DBUILD_GPL3=OFF

    - name: '🚧 Build application (PGO optimized)'
      run: cmake --build build --config Release -j 16

    # Hard gate: the shipped PGO binary must sustain >= 256 kHz on the hotpath.
    - name: '🚦 Hotpath throughput gate (256 kHz)'
      env:
        QT_QPA_PLATFORM: offscreen
        LD_LIBRARY_PATH: >-
          ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-arm64/${{env.QT_VERSION_LINUX}}/gcc_arm64/lib
      run: |
        ./build/app/${{env.UNIXNAME}} --headless --benchmark-hotpath --min-fps 256000

    - name: '🔎 Scan binaries with deglyph'
      uses: deglyph-re/cli@main
      with:
        path: build/app/${{env.UNIXNAME}}
        sarif: deglyph.sarif
        fail-on: never
        cve: "true"

    - name: '🛡 Upload deglyph SARIF'
      if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: deglyph.sarif
        category: deglyph-linux-arm64

    - name: '📦 Create AppImage'
      run: |
        cd "build/app"
        wget https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20240109-1/linuxdeploy-aarch64.AppImage
        #wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-aarch64.AppImage
        wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-aarch64.AppImage
        chmod +x linuxdeploy-aarch64.AppImage
        chmod +x linuxdeploy-plugin-qt-aarch64.AppImage

        export QML_SOURCES_PATHS="${{env.QML_DIR}}"

        QT_PLUGINS_PATH="${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-arm64/${{env.QT_VERSION_LINUX}}/gcc_arm64/plugins"
        rm -f "$QT_PLUGINS_PATH/imageformats/libqtiff.so"

        ./linuxdeploy-aarch64.AppImage --appdir AppDir -e ${{env.UNIXNAME}} -i ../../app/deploy/linux/${{env.UNIXNAME}}.svg -d ../../app/deploy/linux/${{env.UNIXNAME}}.desktop --plugin qt --output appimage
        mkdir -p AppDir/usr/plugins/canbus
        if [ -d "$QT_PLUGINS_PATH/canbus" ]; then
          cp -r "$QT_PLUGINS_PATH/canbus/"* AppDir/usr/plugins/canbus/ || echo "Warning: Could not copy canbus plugins"
        else
          echo "Warning: Qt canbus plugins not found at $QT_PLUGINS_PATH/canbus"
        fi

        ./linuxdeploy-aarch64.AppImage --appdir AppDir --output appimage

        rm linuxdeploy-aarch64.AppImage
        rm linuxdeploy-plugin-qt-aarch64.AppImage

        mv *.AppImage ../../${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-arm64.AppImage

    - name: '✍🏻 Sign Linux artifacts (GPG, optional)'
      env:
        GPG_PRIVATE_KEY: ${{secrets.GPG_PRIVATE_KEY}}
        GPG_PASSPHRASE: ${{secrets.GPG_PASSPHRASE}}
        GPG_KEY_ID: ${{secrets.GPG_KEY_ID}}
      run: |
        set -euo pipefail
        if [ -z "${GPG_KEY_ID:-}" ] || [ -z "${GPG_PRIVATE_KEY:-}" ]; then
          echo "GPG signing secrets not set; skipping Linux signing."
          exit 0
        fi
        printf '%s\n' "$GPG_PRIVATE_KEY" | gpg --batch --import
        APPIMAGE="${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-arm64.AppImage"
        BIN="${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-arm64"
        cp "build/app/${{env.UNIXNAME}}" "$BIN"
        for f in "$APPIMAGE" "$BIN"; do
          gpg --batch --yes --pinentry-mode loopback \
            ${GPG_PASSPHRASE:+--passphrase "$GPG_PASSPHRASE"} \
            --local-user "$GPG_KEY_ID" \
            --detach-sign --armor --output "$f.asc" "$f"
          gpg --verify "$f.asc" "$f"
        done

    - name: '📤 Upload artifact: AppImage'
      uses: actions/upload-artifact@v5
      with:
        name: ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-arm64.AppImage
        path: ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-arm64.AppImage

    - name: '📤 Upload artifact: signatures + signed binary (arm64)'
      uses: actions/upload-artifact@v5
      with:
        name: ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-arm64-signed
        if-no-files-found: ignore
        path: |
          ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-arm64.AppImage.asc
          ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-arm64
          ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-arm64.asc

#-------------------------------------------------------------------------------
# macOS universal build (arm64 + x86_64, both PGO-trained, lipo'd into one binary).
# Both slices are built on the arm64 runner; the Intel runner (macos-13) is gone.
# arm64 trains natively; x86_64 trains its instrumented slice under Rosetta 2. The
# 256 kHz hard gate stays arm64-only -- Rosetta throughput isn't representative.
#-------------------------------------------------------------------------------

  build-macos:
    runs-on: macos-latest
    name: '🍎 macOS (universal)'
    permissions:
      contents: read
      security-events: write
    steps:
    - name: '🧰 Checkout'
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: '⚙️ Download prebuilt gRPC (universal)'
      run: |
        gh release download v${{env.GRPC_VERSION}} \
          -R ${{env.GRPC_REPO}} \
          -p "grpc-${{env.GRPC_VERSION}}-macos-universal.tar.gz"
        mkdir -p ${{github.workspace}}/grpc-prefix
        tar -xzf grpc-${{env.GRPC_VERSION}}-macos-universal.tar.gz -C ${{github.workspace}}/grpc-prefix
      env:
        GH_TOKEN: ${{secrets.GITHUB_TOKEN}}

    - name: '⚙️ Restore Qt Cache'
      uses: actions/cache/restore@v5
      if: env.INSTALL_QT_MACOS == 'false'
      with:
        path: |
          ${{github.workspace}}/Qt-${{env.QT_VERSION_MACOS}}-${{runner.os}}-x64
          ${{env.USERPROFILE}}/.qt-license
        key: qt-${{runner.os}}-${{env.QT_VERSION_MACOS}}

    - name: '⚙️ Install Qt'
      shell: bash
      if: env.INSTALL_QT_MACOS == 'true'
      env:
        QT_VERSION: ${{env.QT_VERSION_MACOS}}
        QT_ARCH: x64
        QT_USERNAME: ${{secrets.QT_USERNAME}}
        QT_PASSWORD: ${{secrets.QT_PASSWORD}}
        QT_OUTPUT_DIR: ${{github.workspace}}/Qt-${{env.QT_VERSION_MACOS}}-${{runner.os}}-x64
      run: |
        chmod +x ./scripts/install-qt.sh
        ./scripts/install-qt.sh

    - name: '⚙️ Save Qt Cache'
      if: env.INSTALL_QT_MACOS == 'true'
      uses: actions/cache/save@v5
      with:
        path: |
          ${{github.workspace}}/Qt-${{env.QT_VERSION_MACOS}}-${{runner.os}}-x64
          ${{env.USERPROFILE}}/.qt-license
        key: qt-${{runner.os}}-${{env.QT_VERSION_MACOS}}

    - name: '⚙️ Add Qt to PATH'
      shell: bash
      env:
        QT_VERSION: ${{env.QT_VERSION_MACOS}}
        QT_OUTPUT_DIR: ${{github.workspace}}/Qt-${{env.QT_VERSION_MACOS}}-${{runner.os}}-x64
      run: |
        export QT_BIN_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/macos/bin"
        export QT_LIBEXEC_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/macos/libexec"
        export CMAKE_PREFIX_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/macos/lib/cmake"

        echo "$QT_BIN_PATH" >> $GITHUB_PATH
        echo "$QT_LIBEXEC_PATH" >> $GITHUB_PATH
        echo "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH" >> $GITHUB_ENV

    - name: '⚙️ Install CMake'
      uses: lukka/get-cmake@latest
      with:
        useLocalCache: true

    - name: '⚙️ Install Node'
      uses: actions/setup-node@v6
      with:
        node-version: 22

    # macOS ships a universal binary. PGO must be trained on a native runner, so
    # only the arm64 slice (built + trained here) is PGO-optimized; the x86_64
    # slice is cross-built without PGO below and lipo'd in.
    # PGO stage 1 (GENERATE): instrumented arm64 build.
    - name: '🚧 Configure with CMake (PGO generate, arm64)'
      env:
        ARCGIS_API_KEY: ${{secrets.ARCGIS_API_KEY}}
        SERIAL_STUDIO_LICENSE_KEY: ${{secrets.SERIAL_STUDIO_LICENSE_KEY}}
        SERIAL_STUDIO_INSTANCE_ID: ${{secrets.SERIAL_STUDIO_INSTANCE_ID}}
      run: |
        cmake -B build \
          -DPRODUCTION_OPTIMIZATION=ON \
          -DENABLE_HARDENING=ON \
          -DENABLE_GRPC=ON \
          -DENABLE_PGO=ON \
          -DPGO_STAGE=GENERATE \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
          -DCMAKE_OSX_ARCHITECTURES="arm64" \
          -DCMAKE_PREFIX_PATH="${{github.workspace}}/grpc-prefix;${CMAKE_PREFIX_PATH}" \
          -DBUILD_COMMERCIAL=ON \
          -DBUILD_GPL3=OFF

    - name: '🚧 Build application (instrumented, arm64)'
      run: cmake --build build --config Release -j 16

    # PGO training workload. --min-fps 1 (smoke, not a gate): the authoritative
    # 256 kHz hard gate runs on the Linux x86_64 reference build.
    - name: '🏋️ PGO training run (hotpath)'
      env:
        QT_QPA_PLATFORM: offscreen
        DYLD_FRAMEWORK_PATH: ${{github.workspace}}/Qt-${{env.QT_VERSION_MACOS}}-${{runner.os}}-x64/${{env.QT_VERSION_MACOS}}/macos/lib
      run: |
        ./build/app/${{env.EXECUTABLE}}.app/Contents/MacOS/${{env.EXECUTABLE}} --headless --benchmark-hotpath --min-fps 1 --benchmark-frames 8000000

    # PGO stage 3 (USE): rebuild arm64 consuming the merged profile data
    # (the USE configure runs llvm-profdata; it must be on PATH).
    - name: '🚧 Reconfigure with CMake (PGO use, arm64)'
      env:
        ARCGIS_API_KEY: ${{secrets.ARCGIS_API_KEY}}
        SERIAL_STUDIO_LICENSE_KEY: ${{secrets.SERIAL_STUDIO_LICENSE_KEY}}
        SERIAL_STUDIO_INSTANCE_ID: ${{secrets.SERIAL_STUDIO_INSTANCE_ID}}
      run: |
        cmake -B build \
          -DPRODUCTION_OPTIMIZATION=ON \
          -DENABLE_HARDENING=ON \
          -DENABLE_GRPC=ON \
          -DENABLE_PGO=ON \
          -DPGO_STAGE=USE \
          -DLLVM_PROFDATA=$(xcrun -f llvm-profdata) \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
          -DCMAKE_OSX_ARCHITECTURES="arm64" \
          -DCMAKE_PREFIX_PATH="${{github.workspace}}/grpc-prefix;${CMAKE_PREFIX_PATH}" \
          -DBUILD_COMMERCIAL=ON \
          -DBUILD_GPL3=OFF

    - name: '🚧 Build application (PGO optimized, arm64)'
      run: cmake --build build --config Release -j 16

    # Hard gate: the arm64 slice must sustain >= 256 kHz (native on this runner).
    - name: '🚦 Hotpath throughput gate (256 kHz)'
      env:
        QT_QPA_PLATFORM: offscreen
        DYLD_FRAMEWORK_PATH: ${{github.workspace}}/Qt-${{env.QT_VERSION_MACOS}}-${{runner.os}}-x64/${{env.QT_VERSION_MACOS}}/macos/lib
      run: |
        ./build/app/${{env.EXECUTABLE}}.app/Contents/MacOS/${{env.EXECUTABLE}} --headless --benchmark-hotpath --min-fps 256000

    # x86_64 slice: cross-built on this arm64 host and PGO-trained under Rosetta 2.
    # Built into a separate tree (its own pgo-profiles dir); only its Mach-O is used.
    # PGO stage 1 (GENERATE): instrumented x86_64 build.
    - name: '🚧 Configure with CMake (PGO generate, x86_64)'
      env:
        ARCGIS_API_KEY: ${{secrets.ARCGIS_API_KEY}}
        SERIAL_STUDIO_LICENSE_KEY: ${{secrets.SERIAL_STUDIO_LICENSE_KEY}}
        SERIAL_STUDIO_INSTANCE_ID: ${{secrets.SERIAL_STUDIO_INSTANCE_ID}}
      run: |
        cmake -B build-x86_64 \
          -DPRODUCTION_OPTIMIZATION=ON \
          -DENABLE_HARDENING=ON \
          -DENABLE_GRPC=ON \
          -DENABLE_PGO=ON \
          -DPGO_STAGE=GENERATE \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
          -DCMAKE_OSX_ARCHITECTURES="x86_64" \
          -DCMAKE_PREFIX_PATH="${{github.workspace}}/grpc-prefix;${CMAKE_PREFIX_PATH}" \
          -DBUILD_COMMERCIAL=ON \
          -DBUILD_GPL3=OFF

    - name: '🚧 Build application (instrumented, x86_64)'
      run: cmake --build build-x86_64 --config Release -j 16

    # Rosetta 2 lets this arm64 host execute the instrumented x86_64 binary so it can
    # emit .profraw. The install is idempotent and a no-op when already present.
    - name: '⚙️ Ensure Rosetta 2'
      run: softwareupdate --install-rosetta --agree-to-license

    # PGO training workload (x86_64 under Rosetta). --min-fps 1 (smoke, not a gate):
    # the authoritative 256 kHz hard gate runs on the Linux x86_64 reference build.
    - name: '🏋️ PGO training run (hotpath, x86_64 / Rosetta)'
      env:
        QT_QPA_PLATFORM: offscreen
        DYLD_FRAMEWORK_PATH: ${{github.workspace}}/Qt-${{env.QT_VERSION_MACOS}}-${{runner.os}}-x64/${{env.QT_VERSION_MACOS}}/macos/lib
      run: |
        arch -x86_64 ./build-x86_64/app/${{env.EXECUTABLE}}.app/Contents/MacOS/${{env.EXECUTABLE}} --headless --benchmark-hotpath --min-fps 1 --benchmark-frames 8000000

    # PGO stage 3 (USE): rebuild x86_64 consuming the merged profile data
    # (the USE configure runs llvm-profdata; it must be on PATH).
    - name: '🚧 Reconfigure with CMake (PGO use, x86_64)'
      env:
        ARCGIS_API_KEY: ${{secrets.ARCGIS_API_KEY}}
        SERIAL_STUDIO_LICENSE_KEY: ${{secrets.SERIAL_STUDIO_LICENSE_KEY}}
        SERIAL_STUDIO_INSTANCE_ID: ${{secrets.SERIAL_STUDIO_INSTANCE_ID}}
      run: |
        cmake -B build-x86_64 \
          -DPRODUCTION_OPTIMIZATION=ON \
          -DENABLE_HARDENING=ON \
          -DENABLE_GRPC=ON \
          -DENABLE_PGO=ON \
          -DPGO_STAGE=USE \
          -DLLVM_PROFDATA=$(xcrun -f llvm-profdata) \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
          -DCMAKE_OSX_ARCHITECTURES="x86_64" \
          -DCMAKE_PREFIX_PATH="${{github.workspace}}/grpc-prefix;${CMAKE_PREFIX_PATH}" \
          -DBUILD_COMMERCIAL=ON \
          -DBUILD_GPL3=OFF

    - name: '🚧 Build application (PGO optimized, x86_64)'
      run: cmake --build build-x86_64 --config Release -j 16

    # Splice the PGO arm64 slice and the non-PGO x86_64 slice into one universal
    # Mach-O, in place in the build tree, so cpack/macdeployqt bundles it.
    - name: '🔗 Lipo arm64 + x86_64 into a universal binary'
      run: |
        APP_EXE="build/app/${{env.EXECUTABLE}}.app/Contents/MacOS/${{env.EXECUTABLE}}"
        X64_EXE="build-x86_64/app/${{env.EXECUTABLE}}.app/Contents/MacOS/${{env.EXECUTABLE}}"
        lipo -create "$APP_EXE" "$X64_EXE" -output "$APP_EXE.universal"
        mv "$APP_EXE.universal" "$APP_EXE"
        lipo -info "$APP_EXE"
        lipo -info "$APP_EXE" | grep -q "arm64" && lipo -info "$APP_EXE" | grep -q "x86_64"

    - name: '🔎 Scan binaries with deglyph'
      uses: deglyph-re/cli@main
      with:
        path: build/app/${{env.EXECUTABLE}}.app/Contents/MacOS/${{env.EXECUTABLE}}
        sarif: deglyph.sarif
        fail-on: never
        cve: "true"

    - name: '🛡 Upload deglyph SARIF'
      if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: deglyph.sarif
        category: deglyph-macos

    - name: '📦 Package application'
      run: |
        cd build
        cpack --verbose

    - name: '🪪 Import Certificates'
      uses: apple-actions/import-codesign-certs@v6
      with:
        p12-file-base64: ${{secrets.APPLE_CERTIFICATES_P12}}
        p12-password: ${{secrets.APPLE_CERTIFICATES_P12_PASSWORD}}

    - name: '💿 Mount DMG and copy application'
      run: |
        VOLUME=$(yes | hdiutil attach ./build/*.dmg -nobrowse | grep "Volumes" | awk '{print $3}')
        cp -a "$VOLUME/${{env.EXECUTABLE}}.app" "${{env.APPLICATION}}.app"
        hdiutil detach "$VOLUME"

    - name: '✍🏻 Sign Application with Entitlements'
      run: |
        codesign --force --deep --options runtime \
          --entitlements "${GITHUB_WORKSPACE}/app/deploy/macOS/Serial-Studio.entitlements" \
          --sign "${{secrets.APPLE_APPID_TEAM_ID}}" \
          "${{env.APPLICATION}}.app"

    - name: '💽 Create nice DMG'
      run: |
        npm install --global create-dmg
        rm LICENSE.md
        create-dmg "${{env.APPLICATION}}.app" --dmg-title="${{env.APPLICATION}}"
        mv "${{env.APPLICATION}} ${{env.VERSION}}.dmg" "${{env.EXECUTABLE}}-${{env.VERSION}}-macOS.dmg"

    - name: '📋 Notarize'
      shell: bash
      env:
        PRODUCT_PATH: ${{env.EXECUTABLE}}-${{env.VERSION}}-macOS.dmg
        APPLE_ID: ${{secrets.APPLE_NOTARIZATION_USERNAME}}
        APP_PASSWORD: ${{secrets.APPLE_NOTARIZATION_PASSWORD}}
        TEAM_ID: ${{secrets.APPLE_NOTARIZATION_TEAMID}}
      run: |
        echo "Submitting $PRODUCT_PATH for notarization..."
        xcrun notarytool submit "$PRODUCT_PATH" \
          --apple-id "$APPLE_ID" \
          --password "$APP_PASSWORD" \
          --team-id "$TEAM_ID" \
          --wait \
          --output-format json

    - name: '📌 Staple'
      shell: bash
      run: |
        PRODUCT="${{env.EXECUTABLE}}-${{env.VERSION}}-macOS.dmg"
        echo "Stapling $PRODUCT..."
        xcrun stapler staple "$PRODUCT"

    - name: '📤 Upload artifact: DMG'
      uses: actions/upload-artifact@v5
      with:
        name: ${{env.EXECUTABLE}}-${{env.VERSION}}-macOS.dmg
        path: ${{env.EXECUTABLE}}-${{env.VERSION}}-macOS.dmg

#-------------------------------------------------------------------------------
# Windows build (MSVC 2022 x86_64)
#-------------------------------------------------------------------------------

  build-windows:
    runs-on: windows-latest
    name: '🧊 Windows'
    permissions:
      contents: read
      security-events: write
    steps:
    - run: git config --global core.autocrlf input
    - name: '🧰 Checkout'
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: '⚙️ Restore Qt Cache'
      uses: actions/cache/restore@v5
      if: env.INSTALL_QT_WINDOWS == 'false'
      with:
        path: |
          ${{github.workspace}}/Qt-${{env.QT_VERSION_WINDOWS}}-${{runner.os}}-x64
          ${{env.USERPROFILE}}/.qt-license
        key: qt-${{runner.os}}-${{env.QT_VERSION_WINDOWS}}-x64-msvc2022_64

    - name: '⚙️ Install Qt'
      shell: pwsh
      if: env.INSTALL_QT_WINDOWS == 'true'
      env:
        QT_VERSION: ${{env.QT_VERSION_WINDOWS}}
        QT_ARCH: x64
        QT_USERNAME: ${{secrets.QT_USERNAME}}
        QT_PASSWORD: ${{secrets.QT_PASSWORD}}
        QT_OUTPUT_DIR: ${{github.workspace}}/Qt-${{env.QT_VERSION_WINDOWS}}-${{runner.os}}-x64
      run: |
        ./scripts/install-qt.ps1

    - name: '⚙️ Save Qt Cache'
      if: env.INSTALL_QT_WINDOWS == 'true'
      uses: actions/cache/save@v5
      with:
        path: |
          ${{github.workspace}}/Qt-${{env.QT_VERSION_WINDOWS}}-${{runner.os}}-x64
          ${{env.USERPROFILE}}/.qt-license
        key: qt-${{runner.os}}-${{env.QT_VERSION_WINDOWS}}-x64-msvc2022_64

    - name: '⚙️ Add Qt to PATH'
      shell: pwsh
      env:
        QT_VERSION: ${{env.QT_VERSION_WINDOWS}}
        QT_OUTPUT_DIR: ${{github.workspace}}/Qt-${{env.QT_VERSION_WINDOWS}}-${{runner.os}}-x64
      run: |
        $QT_BIN_PATH = "$env:QT_OUTPUT_DIR\$env:QT_VERSION\msvc2022_64\bin"
        $QT_LIBEXEC_PATH = "$env:QT_OUTPUT_DIR\$env:QT_VERSION\msvc2022_64\libexec"
        $CMAKE_PREFIX_PATH = "$env:QT_OUTPUT_DIR\$env:QT_VERSION\msvc2022_64\lib\cmake"

        Write-Output "$QT_BIN_PATH" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        Write-Output "$QT_LIBEXEC_PATH" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        Write-Output "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH" >> $env:GITHUB_ENV

    - name: '⚙️ Install CMake'
      uses: lukka/get-cmake@latest
      with:
        useLocalCache: false
        useCloudCache: false

    - name: '🛠 Setup MSVC Development Environment'
      uses: TheMrMilchmann/setup-msvc-dev@v4
      with:
        arch: x64

    - name: '⚙️ Download prebuilt gRPC'
      run: |
        gh release download v${{env.GRPC_VERSION}} `
          -R ${{env.GRPC_REPO}} `
          -p "grpc-${{env.GRPC_VERSION}}-windows-x86_64.zip"
        mkdir "${{github.workspace}}\grpc-prefix"
        7z x grpc-${{env.GRPC_VERSION}}-windows-x86_64.zip -o"${{github.workspace}}\grpc-prefix"
      env:
        GH_TOKEN: ${{secrets.GITHUB_TOKEN}}

    # PGO stage 1 (GENERATE): instrumented MSVC build. The instrumented exe
    # needs pgort140.dll at runtime (provided by the MSVC dev env on PATH) and
    # writes .pgc profile data that is merged into profile.pgd before the USE link.
    - name: '🚧 Configure with CMake (PGO generate)'
      env:
        ARCGIS_API_KEY: ${{secrets.ARCGIS_API_KEY}}
        SERIAL_STUDIO_LICENSE_KEY: ${{secrets.SERIAL_STUDIO_LICENSE_KEY}}
        SERIAL_STUDIO_INSTANCE_ID: ${{secrets.SERIAL_STUDIO_INSTANCE_ID}}
      run: |
        cmake -B build -G Ninja `
          -DCMAKE_CXX_COMPILER=cl `
          -DCMAKE_C_COMPILER=cl `
          -DCMAKE_PREFIX_PATH="${{github.workspace}}/grpc-prefix" `
          -DPRODUCTION_OPTIMIZATION=ON `
          -DENABLE_HARDENING=ON `
          -DENABLE_GRPC=ON `
          -DENABLE_PGO=ON `
          -DPGO_STAGE=GENERATE `
          -DCMAKE_BUILD_TYPE=Release `
          -DBUILD_COMMERCIAL=ON `
          -DBUILD_GPL3=OFF

    - name: '🚧 Build application (instrumented)'
      run: cmake --build build --config Release -j 16

    # PGO training workload. --min-fps 1 (smoke, not a gate): the authoritative
    # 256 kHz hard gate runs on the Linux x86_64 reference build.
    # Start-Process -Wait: the GUI-subsystem exe does not block the shell when
    # launched with '&', so without this the .pgc data is not flushed before the merge.
    - name: '🏋️ PGO training run (hotpath)'
      run: |
        $p = Start-Process -FilePath "build/app/${{env.EXECUTABLE}}.exe" `
          -ArgumentList '--headless','--benchmark-hotpath','--min-fps','1','--benchmark-frames','8000000' `
          -NoNewWindow -Wait -PassThru
        exit $p.ExitCode

    # Merge instrumentation counts (.pgc) into the .pgd the USE link reads.
    - name: '🧮 Merge PGO profile data'
      run: |
        $pgc = Get-ChildItem -Path build/pgo-profiles -Filter *.pgc -ErrorAction SilentlyContinue
        if ($pgc) { pgomgr /merge build/pgo-profiles/*.pgc build/pgo-profiles/profile.pgd }
        else { Write-Output 'No .pgc produced; USE stage relies on existing profile.pgd' }

    # PGO stage 3 (USE): rebuild consuming profile.pgd.
    - name: '🚧 Reconfigure with CMake (PGO use)'
      env:
        ARCGIS_API_KEY: ${{secrets.ARCGIS_API_KEY}}
        SERIAL_STUDIO_LICENSE_KEY: ${{secrets.SERIAL_STUDIO_LICENSE_KEY}}
        SERIAL_STUDIO_INSTANCE_ID: ${{secrets.SERIAL_STUDIO_INSTANCE_ID}}
      run: |
        cmake -B build -G Ninja `
          -DCMAKE_CXX_COMPILER=cl `
          -DCMAKE_C_COMPILER=cl `
          -DCMAKE_PREFIX_PATH="${{github.workspace}}/grpc-prefix" `
          -DPRODUCTION_OPTIMIZATION=ON `
          -DENABLE_HARDENING=ON `
          -DENABLE_GRPC=ON `
          -DENABLE_PGO=ON `
          -DPGO_STAGE=USE `
          -DCMAKE_BUILD_TYPE=Release `
          -DBUILD_COMMERCIAL=ON `
          -DBUILD_GPL3=OFF

    - name: '🚧 Build application (PGO optimized)'
      run: cmake --build build --config Release -j 16

    # Hard gate: the shipped PGO binary must sustain >= 256 kHz on the hotpath.
    # Start-Process -Wait -PassThru is required because the GUI-subsystem exe does
    # not block '&'; exiting with its code fails the job (and the release) below threshold.
    - name: '🚦 Hotpath throughput gate (256 kHz)'
      run: |
        $p = Start-Process -FilePath "build/app/${{env.EXECUTABLE}}.exe" `
          -ArgumentList '--headless','--benchmark-hotpath','--min-fps','256000' `
          -NoNewWindow -Wait -PassThru
        exit $p.ExitCode

    - name: '🔎 Scan binaries with deglyph'
      uses: deglyph-re/cli@main
      with:
        path: build/app/${{env.EXECUTABLE}}.exe
        sarif: deglyph.sarif
        fail-on: never
        cve: "true"

    - name: '🛡 Upload deglyph SARIF'
      if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: deglyph.sarif
        category: deglyph-windows

    - name: '⚙️ Add msbuild to PATH'
      uses: microsoft/setup-msbuild@v3

    - name: '⚙️ Install WiX'
      run: dotnet tool install --global wix

    - name: '📦 Create MSI installer'
      run: |
        cd build
        cpack --verbose
        mv *.msi ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows.msi
        mv ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows.msi ../

    - name: '📦 Create portable TGZ'
      run: |
        cd build
        cpack -G TGZ
        mv *.tar.gz ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows.tgz

    - name: '📦 Extract TGZ contents'
      shell: bash
      run: |
        cd build
        7z x ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows.tgz
        7z x ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows.tar
        DIRNAME=$(tar -tf ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows.tar 2>/dev/null | head -1 | cut -f1 -d"/" || true)
        echo $DIRNAME > dirname.txt
        cp ../app/deploy/windows/license.rtf ./License.rtf

    - name: '📝 Create Windows batch launcher'
      shell: bash
      run: |
        cd build
        DIRNAME=$(cat dirname.txt)
        echo "@echo off" > "${{env.APPLICATION}}.bat"
        echo "start \"\" \"%~dp0${DIRNAME}\\bin\\${{env.EXECUTABLE}}.exe\"" >> "${{env.APPLICATION}}.bat"

    - name: '📦 Add files to ZIP'
      shell: bash
      run: |
        cd build
        DIRNAME=$(cat dirname.txt)
        7z a ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows-Portable.zip "${{env.APPLICATION}}.bat" License.rtf $DIRNAME/*
        mv ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows-Portable.zip ..

    - name: '📤 Upload artifact: MSI installer'
      uses: actions/upload-artifact@v5
      with:
        name: ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows.msi
        path: ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows.msi

    - name: '📤 Upload artifact: Portable ZIP'
      uses: actions/upload-artifact@v5
      with:
       name: ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows-Portable
       path: ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows-Portable.zip

#-------------------------------------------------------------------------------
# Create release
#-------------------------------------------------------------------------------

  upload:
    name: '🗂 Create release and upload artifacts'
    needs:
      - build-macos
      - build-linux
      - build-windows
      - build-linux-arm64

    permissions:
      contents: write

    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.ref_name || 'continuous' }}

    steps:
      - name: '🧰 Checkout'
        uses: actions/checkout@v5

      - name: '📥 Download artifacts'
        uses: actions/download-artifact@v5
        with:
          path: ./artifacts
          merge-multiple: true

      - name: '🗑️ Delete previous release and tag if exists'
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release '$RELEASE_TAG' exists. Deleting..."
            gh release delete "$RELEASE_TAG" --cleanup-tag --yes --repo "$GITHUB_REPOSITORY" || echo "Failed to delete release. Ignoring."
          else
            echo "No release named '$RELEASE_TAG' found. Skipping delete."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: '🚀 Create Release'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.RELEASE_TAG }}
          commit: ${{ github.sha }}
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          name: 'Continuous Build'
          artifacts: |
            artifacts/*.AppImage
            artifacts/*.dmg
            artifacts/*.msi
            artifacts/*.zip
