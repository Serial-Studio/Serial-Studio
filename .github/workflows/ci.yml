#-------------------------------------------------------------------------------
# Workflow configuration
#-------------------------------------------------------------------------------

name: CI

on:
  push:             
    paths-ignore:     
    - '**.md'        

  pull_request:       
    paths-ignore:   
    - '**.md'         

#-------------------------------------------------------------------------------
# Define application name & version
#-------------------------------------------------------------------------------

env:

  #
  # Application information
  #
  VERSION: "3.2.7"
  PUBLISHER: "Alex Spataru"
  UNIXNAME: "serial-studio-pro"
  EXECUTABLE: "Serial-Studio-Pro"
  APPLICATION: "Serial Studio Pro"
  DESCRIPTION: "Multi-purpose serial data visualization & processing program"

  #
  # QML location (for windeployqt/macdeployqt)
  #
  QML_DIR: "../../app/qml"

  #
  # Qt version selection
  #
  QT_VERSION_LINUX: 6.11.1
  QT_VERSION_MACOS: 6.11.1
  QT_VERSION_WINDOWS: 6.11.1
  QTFRAMEWORK_BYPASS_LICENSE_CHECK: "true"

  #
  # gRPC selection
  #
  GRPC_VERSION: 1.78.1
  GRPC_REPO: alex-spataru/gRPC-Builds

  #
  # Qt cache management
  #
  INSTALL_QT_WINDOWS: true
  INSTALL_QT_MACOS_ARM64: false
  INSTALL_QT_MACOS_INTEL: true
  INSTALL_QT_LINUX_INTEL: true
  INSTALL_QT_LINUX_ARM64: true

  #
  # Test gating
  #
  REQUIRE_TESTS_TO_PUBLISH: false
  
  #
  # Excluded AppImage libraries
  #
  LINUXDEPLOY_EXCLUDED_LIBRARIES: "libmysqlclient.so*;libqsqlmimer.so;libqsqlmysql.so;libqsqlodbc.so;libqsqlpsql.so;libqsqloci.so;libqsqldb2.so;libqsqlibase.so"


#-------------------------------------------------------------------------------
# Begin workflow jobs definition
#-------------------------------------------------------------------------------

jobs:

#-------------------------------------------------------------------------------
# GNU/Linux build (x86_64)
#-------------------------------------------------------------------------------

  build-linux:
    runs-on: ubuntu-24.04
    name: '🐧 Linux Build (x86_64)'
    permissions:
      contents: read
      security-events: write
    steps:
    - name: '🧰 Checkout'
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: '⚙️ Install dependencies'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          fakeroot \
          libcups2-dev \
          libegl1 \
          libfuse2 \
          libgl1-mesa-dev \
          libasound2-dev \
          libudev-dev \
          libsecret-1-dev \
          libzstd-dev \
          zlib1g-dev \
          libexpat1-dev \
          libminizip-dev \
          libopus-dev \
          rpm \
          libxcb1 \
          libxcb-cursor0 \
          libxcb-cursor-dev \
          libxcb-glx0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-image0-dev \
          libxcb-keysyms1 \
          libxcb-randr0 \
          libxcb-render0 \
          libxcb-render-util0 \
          libxcb-shape0 \
          libxcb-shm0 \
          libxcb-sync1 \
          libxcb-util0-dev \
          libxcb-util1 \
          libxcb-xfixes0 \
          libxcb-xinerama0 \
          libxcb-xkb-dev \
          libxcb-xtest0 \
          libxkbcommon-dev \
          libxkbcommon-x11-0 \
          libxkbcommon-x11-dev \
          libpulse-dev \
          libpipewire-0.3-0 \
          libgstreamer1.0-0 \
          libgstreamer-plugins-base1.0-0 \
          libgstreamer-plugins-bad1.0-0 \
          libgstreamer-plugins-good1.0-0 \
          libgstreamer-gl1.0-0 \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          gstreamer1.0-plugins-bad \
          gstreamer1.0-plugins-ugly \
          gstreamer1.0-libav \
          gstreamer1.0-tools \
          gstreamer1.0-x \
          gstreamer1.0-alsa \
          gstreamer1.0-pulseaudio \
          gstreamer1.0-gl \
          
    - name: '⚙️ Download prebuilt gRPC'
      run: |
        gh release download v${{env.GRPC_VERSION}} \
          -R ${{env.GRPC_REPO}} \
          -p "grpc-${{env.GRPC_VERSION}}-linux-x86_64.tar.gz"
        mkdir -p ${{github.workspace}}/grpc-prefix
        tar -xzf grpc-${{env.GRPC_VERSION}}-linux-x86_64.tar.gz -C ${{github.workspace}}/grpc-prefix
      env:
        GH_TOKEN: ${{secrets.GITHUB_TOKEN}}

    - name: '⚙️ Restore Qt Cache'
      uses: actions/cache/restore@v5
      if: env.INSTALL_QT_LINUX_INTEL == 'false'
      with:
        path: |
          ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64
          ${{env.USERPROFILE}}/.qt-license
        key: qt-${{runner.os}}-${{env.QT_VERSION_LINUX}}-x64

    - name: '⚙️ Install Qt'
      shell: bash
      if: env.INSTALL_QT_LINUX_INTEL == 'true'
      env:
        QT_VERSION: ${{env.QT_VERSION_LINUX}}
        QT_ARCH: x64
        QT_USERNAME: ${{secrets.QT_USERNAME}}
        QT_PASSWORD: ${{secrets.QT_PASSWORD}}
        QT_OUTPUT_DIR: ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64
      run: |
        chmod +x ./scripts/install-qt.sh
        ./scripts/install-qt.sh

    - name: '⚙️ Save Qt Cache'
      if: env.INSTALL_QT_LINUX_INTEL == 'true'
      uses: actions/cache/save@v5
      with:
        path: |
          ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64
          ${{env.USERPROFILE}}/.qt-license
        key: qt-${{runner.os}}-${{env.QT_VERSION_LINUX}}-x64

    - name: '⚙️ Add Qt to PATH'
      shell: bash
      env:
        QT_VERSION: ${{env.QT_VERSION_LINUX}}
        QT_OUTPUT_DIR: ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64
      run: |
        export QT_BIN_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/gcc_64/bin"
        export QT_LIBEXEC_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/gcc_64/libexec"
        export CMAKE_PREFIX_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/gcc_64/lib/cmake"

        echo "$QT_BIN_PATH" >> $GITHUB_PATH
        echo "$QT_LIBEXEC_PATH" >> $GITHUB_PATH
        echo "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH" >> $GITHUB_ENV

    - name: '⚙️ Install CMake'
      uses: lukka/get-cmake@latest
      with:
        useLocalCache: true

    - name: '🚧 Configure with CMake (PGO generate)'
      env:
        ARCGIS_API_KEY: ${{secrets.ARCGIS_API_KEY}}
        SERIAL_STUDIO_LICENSE_KEY: ${{secrets.SERIAL_STUDIO_LICENSE_KEY}}
        SERIAL_STUDIO_INSTANCE_ID: ${{secrets.SERIAL_STUDIO_INSTANCE_ID}}
      run: |
        cmake -B build \
          -DPRODUCTION_OPTIMIZATION=ON \
          -DENABLE_HARDENING=ON \
          -DENABLE_GRPC=ON \
          -DENABLE_PGO=ON \
          -DPGO_STAGE=GENERATE \
          -DUSE_SYSTEM_ZLIB=ON \
          -DUSE_SYSTEM_EXPAT=ON \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="${{github.workspace}}/grpc-prefix;${CMAKE_PREFIX_PATH}" \
          -DBUILD_COMMERCIAL=ON \
          -DBUILD_GPL3=OFF

    - name: '🚧 Build application (instrumented)'
      run: cmake --build build --config Release -j$(getconf _NPROCESSORS_ONLN)

    - name: '🏋️ PGO training run (hotpath)'
      env:
        QT_QPA_PLATFORM: offscreen
        LD_LIBRARY_PATH: >-
          ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64/${{env.QT_VERSION_LINUX}}/gcc_64/lib
      run: |
        ./build/app/${{env.UNIXNAME}} --headless --benchmark-hotpath --min-fps 1

    - name: '🚧 Reconfigure with CMake (PGO use)'
      env:
        ARCGIS_API_KEY: ${{secrets.ARCGIS_API_KEY}}
        SERIAL_STUDIO_LICENSE_KEY: ${{secrets.SERIAL_STUDIO_LICENSE_KEY}}
        SERIAL_STUDIO_INSTANCE_ID: ${{secrets.SERIAL_STUDIO_INSTANCE_ID}}
      run: |
        cmake -B build \
          -DPRODUCTION_OPTIMIZATION=ON \
          -DENABLE_HARDENING=ON \
          -DENABLE_GRPC=ON \
          -DENABLE_PGO=ON \
          -DPGO_STAGE=USE \
          -DUSE_SYSTEM_ZLIB=ON \
          -DUSE_SYSTEM_EXPAT=ON \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="${{github.workspace}}/grpc-prefix;${CMAKE_PREFIX_PATH}" \
          -DBUILD_COMMERCIAL=ON \
          -DBUILD_GPL3=OFF

    - name: '🚧 Build application (PGO optimized)'
      run: cmake --build build --config Release -j$(getconf _NPROCESSORS_ONLN)

    - name: '🚦 Hotpath throughput gate (256 kHz)'
      env:
        QT_QPA_PLATFORM: offscreen
        LD_LIBRARY_PATH: >-
          ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64/${{env.QT_VERSION_LINUX}}/gcc_64/lib
      run: |
        ./build/app/${{env.UNIXNAME}} --headless --benchmark-hotpath --min-fps 256000

    - name: '🔎 Scan binaries with deglyph'
      uses: deglyph-re/cli@main
      with:
        path: build/app/${{env.UNIXNAME}}
        sarif: deglyph.sarif
        fail-on: never
        cve: "true"

    - name: '🛡 Upload deglyph SARIF'
      if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: deglyph.sarif
        category: deglyph-linux-x64

    - name: '📦 Create AppImage'
      run: |
        cd "build/app"
        wget https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20240109-1/linuxdeploy-x86_64.AppImage
        #wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-plugin-qt-x86_64.AppImage

        export QML_SOURCES_PATHS="${{env.QML_DIR}}"

        QT_PLUGINS_PATH="${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64/${{env.QT_VERSION_LINUX}}/gcc_64/plugins"
        rm -f "$QT_PLUGINS_PATH/imageformats/libqtiff.so"

        ./linuxdeploy-x86_64.AppImage --appdir AppDir -e ${{env.UNIXNAME}} -i ../../app/deploy/linux/${{env.UNIXNAME}}.svg -d ../../app/deploy/linux/${{env.UNIXNAME}}.desktop --plugin qt --output appimage
        mkdir -p AppDir/usr/plugins/canbus
        if [ -d "$QT_PLUGINS_PATH/canbus" ]; then
          cp -r "$QT_PLUGINS_PATH/canbus/"* AppDir/usr/plugins/canbus/ || echo "Warning: Could not copy canbus plugins"
        else
          echo "Warning: Qt canbus plugins not found at $QT_PLUGINS_PATH/canbus"
        fi

        # linuxdeploy bundles only xcb/wayland; add offscreen for headless CI tests
        mkdir -p AppDir/usr/plugins/platforms
        if [ -f "$QT_PLUGINS_PATH/platforms/libqoffscreen.so" ]; then
          cp "$QT_PLUGINS_PATH/platforms/libqoffscreen.so" AppDir/usr/plugins/platforms/
        else
          echo "Warning: offscreen platform plugin not found at $QT_PLUGINS_PATH/platforms"
        fi

        ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage

        rm linuxdeploy-x86_64.AppImage
        rm linuxdeploy-plugin-qt-x86_64.AppImage

        mv *.AppImage ../../${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-x64.AppImage

    - name: '✍🏻 Sign Linux artifacts (GPG, optional)'
      env:
        GPG_PRIVATE_KEY: ${{secrets.GPG_PRIVATE_KEY}}
        GPG_PASSPHRASE: ${{secrets.GPG_PASSPHRASE}}
        GPG_KEY_ID: ${{secrets.GPG_KEY_ID}}
      run: |
        set -euo pipefail
        if [ -z "${GPG_KEY_ID:-}" ] || [ -z "${GPG_PRIVATE_KEY:-}" ]; then
          echo "GPG signing secrets not set; skipping Linux signing."
          exit 0
        fi
        printf '%s\n' "$GPG_PRIVATE_KEY" | gpg --batch --import
        APPIMAGE="${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-x64.AppImage"
        BIN="${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-x64"
        cp "build/app/${{env.UNIXNAME}}" "$BIN"
        for f in "$APPIMAGE" "$BIN"; do
          gpg --batch --yes --pinentry-mode loopback \
            ${GPG_PASSPHRASE:+--passphrase "$GPG_PASSPHRASE"} \
            --local-user "$GPG_KEY_ID" \
            --detach-sign --armor --output "$f.asc" "$f"
          gpg --verify "$f.asc" "$f"
        done

    - name: '📤 Upload artifact: AppImage'
      uses: actions/upload-artifact@v5
      with:
        name: ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-x64.AppImage
        path: ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-x64.AppImage

    - name: '📤 Upload artifact: signatures + signed binary (x64)'
      uses: actions/upload-artifact@v5
      with:
        name: ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-x64-signed
        if-no-files-found: ignore
        path: |
          ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-x64.AppImage.asc
          ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-x64
          ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-x64.asc

