        mkdir -p AppDir/usr/plugins/platforms
        if [ -f "$QT_PLUGINS_PATH/platforms/libqoffscreen.so" ]; then
          cp "$QT_PLUGINS_PATH/platforms/libqoffscreen.so" AppDir/usr/plugins/platforms/
        else
          echo "Warning: offscreen platform plugin not found at $QT_PLUGINS_PATH/platforms"
        fi

        ./linuxdeploy-aarch64.AppImage --appdir AppDir --output appimage

        rm linuxdeploy-aarch64.AppImage
        rm linuxdeploy-plugin-qt-aarch64.AppImage

        mv *.AppImage ../../${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-arm64.AppImage

    - name: '✍🏻 Sign Linux artifacts (GPG, optional)'
      env:
        GPG_PRIVATE_KEY: ${{secrets.GPG_PRIVATE_KEY}}
        GPG_PASSPHRASE: ${{secrets.GPG_PASSPHRASE}}
        GPG_KEY_ID: ${{secrets.GPG_KEY_ID}}
      run: |
        set -euo pipefail
        if [ -z "${GPG_KEY_ID:-}" ] || [ -z "${GPG_PRIVATE_KEY:-}" ]; then
          echo "GPG signing secrets not set; skipping Linux signing."
          exit 0
        fi
        printf '%s\n' "$GPG_PRIVATE_KEY" | gpg --batch --import
        APPIMAGE="${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-arm64.AppImage"
        BIN="${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-arm64"
        cp "build/app/${{env.UNIXNAME}}" "$BIN"
        for f in "$APPIMAGE" "$BIN"; do
          gpg --batch --yes --pinentry-mode loopback \
            ${GPG_PASSPHRASE:+--passphrase "$GPG_PASSPHRASE"} \
            --local-user "$GPG_KEY_ID" \
            --detach-sign --armor --output "$f.asc" "$f"
          gpg --verify "$f.asc" "$f"
        done

    - name: '📤 Upload artifact: AppImage'
      uses: actions/upload-artifact@v5
      with:
        name: ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-arm64.AppImage
        path: ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-arm64.AppImage

    - name: '📤 Upload artifact: signatures + signed binary (arm64)'
      uses: actions/upload-artifact@v5
      with:
        name: ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-arm64-signed
        if-no-files-found: ignore
        path: |
          ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-arm64.AppImage.asc
          ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-arm64
          ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-arm64.asc

#-------------------------------------------------------------------------------
# macOS arm64 slice
#-------------------------------------------------------------------------------

  build-macos-arm64:
    runs-on: macos-latest
    name: '🍎 macOS Build (arm64)'
    permissions:
      contents: read
    steps:
    - name: '🧰 Checkout'
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: '⚙️ Download prebuilt gRPC (universal)'
      run: |
        gh release download v${{env.GRPC_VERSION}} \
          -R ${{env.GRPC_REPO}} \
          -p "grpc-${{env.GRPC_VERSION}}-macos-universal.tar.gz"
        mkdir -p ${{github.workspace}}/grpc-prefix
        tar -xzf grpc-${{env.GRPC_VERSION}}-macos-universal.tar.gz -C ${{github.workspace}}/grpc-prefix
      env:
        GH_TOKEN: ${{secrets.GITHUB_TOKEN}}

    - name: '⚙️ Restore Qt Cache'
      uses: actions/cache/restore@v5
      if: env.INSTALL_QT_MACOS_ARM64 == 'false'
      with:
        path: |
          ${{github.workspace}}/Qt-${{env.QT_VERSION_MACOS}}-${{runner.os}}-x64
          ${{env.USERPROFILE}}/.qt-license
        key: qt-${{runner.os}}-${{env.QT_VERSION_MACOS}}-arm64

    - name: '⚙️ Install Qt'
      shell: bash
      if: env.INSTALL_QT_MACOS_ARM64 == 'true'
      env:
        QT_VERSION: ${{env.QT_VERSION_MACOS}}
        QT_ARCH: x64
        QT_USERNAME: ${{secrets.QT_USERNAME}}
        QT_PASSWORD: ${{secrets.QT_PASSWORD}}
        QT_OUTPUT_DIR: ${{github.workspace}}/Qt-${{env.QT_VERSION_MACOS}}-${{runner.os}}-x64
      run: |
        chmod +x ./scripts/install-qt.sh
        ./scripts/install-qt.sh

    - name: '⚙️ Save Qt Cache'
      if: env.INSTALL_QT_MACOS_ARM64 == 'true'
      uses: actions/cache/save@v5
      with:
        path: |
          ${{github.workspace}}/Qt-${{env.QT_VERSION_MACOS}}-${{runner.os}}-x64
          ${{env.USERPROFILE}}/.qt-license
        key: qt-${{runner.os}}-${{env.QT_VERSION_MACOS}}-arm64

    - name: '⚙️ Add Qt to PATH'
      shell: bash
      env:
        QT_VERSION: ${{env.QT_VERSION_MACOS}}
        QT_OUTPUT_DIR: ${{github.workspace}}/Qt-${{env.QT_VERSION_MACOS}}-${{runner.os}}-x64
      run: |
        export QT_BIN_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/macos/bin"
        export QT_LIBEXEC_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/macos/libexec"
        export CMAKE_PREFIX_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/macos/lib/cmake"

        echo "$QT_BIN_PATH" >> $GITHUB_PATH
        echo "$QT_LIBEXEC_PATH" >> $GITHUB_PATH
        echo "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH" >> $GITHUB_ENV

    - name: '⚙️ Install CMake'
      uses: lukka/get-cmake@latest
      with:
        useLocalCache: true

    - name: '🚧 Configure with CMake (PGO generate, arm64)'
      env:
        ARCGIS_API_KEY: ${{secrets.ARCGIS_API_KEY}}
        SERIAL_STUDIO_LICENSE_KEY: ${{secrets.SERIAL_STUDIO_LICENSE_KEY}}
        SERIAL_STUDIO_INSTANCE_ID: ${{secrets.SERIAL_STUDIO_INSTANCE_ID}}
      run: |
        cmake -B build \
          -DPRODUCTION_OPTIMIZATION=ON \
          -DENABLE_HARDENING=ON \
          -DENABLE_GRPC=ON \
          -DENABLE_PGO=ON \
          -DPGO_STAGE=GENERATE \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
          -DCMAKE_OSX_ARCHITECTURES="arm64" \
          -DCMAKE_PREFIX_PATH="${{github.workspace}}/grpc-prefix;${CMAKE_PREFIX_PATH}" \
          -DBUILD_COMMERCIAL=ON \
          -DBUILD_GPL3=OFF

    - name: '🚧 Build application (instrumented, arm64)'
      run: cmake --build build --config Release -j$(getconf _NPROCESSORS_ONLN)

    - name: '🏋️ PGO training run (hotpath)'
      env:
        QT_QPA_PLATFORM: offscreen
        DYLD_FRAMEWORK_PATH: ${{github.workspace}}/Qt-${{env.QT_VERSION_MACOS}}-${{runner.os}}-x64/${{env.QT_VERSION_MACOS}}/macos/lib
      run: |
        ./build/app/${{env.EXECUTABLE}}.app/Contents/MacOS/${{env.EXECUTABLE}} --headless --benchmark-hotpath --min-fps 1

    - name: '🚧 Reconfigure with CMake (PGO use, arm64)'
      env:
        ARCGIS_API_KEY: ${{secrets.ARCGIS_API_KEY}}
        SERIAL_STUDIO_LICENSE_KEY: ${{secrets.SERIAL_STUDIO_LICENSE_KEY}}
        SERIAL_STUDIO_INSTANCE_ID: ${{secrets.SERIAL_STUDIO_INSTANCE_ID}}
      run: |
        cmake -B build \
          -DPRODUCTION_OPTIMIZATION=ON \
          -DENABLE_HARDENING=ON \
          -DENABLE_GRPC=ON \
          -DENABLE_PGO=ON \
          -DPGO_STAGE=USE \
          -DLLVM_PROFDATA=$(xcrun -f llvm-profdata) \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
          -DCMAKE_OSX_ARCHITECTURES="arm64" \
          -DCMAKE_PREFIX_PATH="${{github.workspace}}/grpc-prefix;${CMAKE_PREFIX_PATH}" \
          -DBUILD_COMMERCIAL=ON \
          -DBUILD_GPL3=OFF

    - name: '🚧 Build application (PGO optimized, arm64)'
      run: cmake --build build --config Release -j$(getconf _NPROCESSORS_ONLN)

    - name: '🚦 Hotpath throughput gate (256 kHz)'
      env:
        QT_QPA_PLATFORM: offscreen
        DYLD_FRAMEWORK_PATH: ${{github.workspace}}/Qt-${{env.QT_VERSION_MACOS}}-${{runner.os}}-x64/${{env.QT_VERSION_MACOS}}/macos/lib
      run: |
        ./build/app/${{env.EXECUTABLE}}.app/Contents/MacOS/${{env.EXECUTABLE}} --headless --benchmark-hotpath --min-fps 256000

    - name: '📦 Package application'
      run: |
        cd build
        cpack --verbose

    - name: '💿 Mount DMG and copy application'
      run: |
        VOLUME=$(yes | hdiutil attach ./build/*.dmg -nobrowse | grep "Volumes" | awk '{print $3}')
        cp -a "$VOLUME/${{env.EXECUTABLE}}.app" "${{env.APPLICATION}}.app"
        hdiutil detach "$VOLUME"

    - name: '🧩 Bundle offscreen platform plugin (headless CI tests)'
      run: |
        QT_PLUGINS_PATH="${{github.workspace}}/Qt-${{env.QT_VERSION_MACOS}}-${{runner.os}}-x64/${{env.QT_VERSION_MACOS}}/macos/plugins"
        DEST="${{env.APPLICATION}}.app/Contents/PlugIns/platforms"
        mkdir -p "$DEST"
        if [ -f "$QT_PLUGINS_PATH/platforms/libqoffscreen.dylib" ]; then
          cp "$QT_PLUGINS_PATH/platforms/libqoffscreen.dylib" "$DEST/"
        else
          echo "Warning: offscreen platform plugin not found at $QT_PLUGINS_PATH/platforms"
        fi

    - name: '🗜 Archive deployed .app'
      run: |
        COPYFILE_DISABLE=1 tar -czf macos-arm64-app.tar.gz "${{env.APPLICATION}}.app"

    - name: '📤 Upload artifact: arm64 deployed .app'
      uses: actions/upload-artifact@v5
      with:
        name: macos-arm64-app
        path: macos-arm64-app.tar.gz
        retention-days: 1

#-------------------------------------------------------------------------------
# macOS x86_64
#-------------------------------------------------------------------------------

  build-macos-intel:
    runs-on: macos-latest
    name: '🍎 macOS Build (x86_64, Rosetta)'
    permissions:
      contents: read
    steps:
    - name: '🧰 Checkout'
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: '⚙️ Download prebuilt gRPC (universal)'
      run: |
        gh release download v${{env.GRPC_VERSION}} \
          -R ${{env.GRPC_REPO}} \
          -p "grpc-${{env.GRPC_VERSION}}-macos-universal.tar.gz"
        mkdir -p ${{github.workspace}}/grpc-prefix
        tar -xzf grpc-${{env.GRPC_VERSION}}-macos-universal.tar.gz -C ${{github.workspace}}/grpc-prefix
      env:
        GH_TOKEN: ${{secrets.GITHUB_TOKEN}}

    - name: '⚙️ Restore Qt Cache'
      uses: actions/cache/restore@v5
      if: env.INSTALL_QT_MACOS_INTEL == 'false'
      with:
        path: |
          ${{github.workspace}}/Qt-${{env.QT_VERSION_MACOS}}-${{runner.os}}-x64
          ${{env.USERPROFILE}}/.qt-license
        key: qt-${{runner.os}}-${{env.QT_VERSION_MACOS}}-x86_64

    - name: '⚙️ Install Qt'
      shell: bash
      if: env.INSTALL_QT_MACOS_INTEL == 'true'
      env:
        QT_VERSION: ${{env.QT_VERSION_MACOS}}
        QT_ARCH: x64
        QT_USERNAME: ${{secrets.QT_USERNAME}}
        QT_PASSWORD: ${{secrets.QT_PASSWORD}}
        QT_OUTPUT_DIR: ${{github.workspace}}/Qt-${{env.QT_VERSION_MACOS}}-${{runner.os}}-x64
      run: |
        chmod +x ./scripts/install-qt.sh
        ./scripts/install-qt.sh

    - name: '⚙️ Save Qt Cache'
      if: env.INSTALL_QT_MACOS_INTEL == 'true'
      uses: actions/cache/save@v5
      with:
        path: |
          ${{github.workspace}}/Qt-${{env.QT_VERSION_MACOS}}-${{runner.os}}-x64
          ${{env.USERPROFILE}}/.qt-license
        key: qt-${{runner.os}}-${{env.QT_VERSION_MACOS}}-x86_64

    - name: '⚙️ Add Qt to PATH'
      shell: bash
      env:
        QT_VERSION: ${{env.QT_VERSION_MACOS}}
        QT_OUTPUT_DIR: ${{github.workspace}}/Qt-${{env.QT_VERSION_MACOS}}-${{runner.os}}-x64
      run: |
        export QT_BIN_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/macos/bin"
        export QT_LIBEXEC_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/macos/libexec"
        export CMAKE_PREFIX_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/macos/lib/cmake"

        echo "$QT_BIN_PATH" >> $GITHUB_PATH
        echo "$QT_LIBEXEC_PATH" >> $GITHUB_PATH
        echo "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH" >> $GITHUB_ENV

    - name: '⚙️ Install CMake'
      uses: lukka/get-cmake@latest
      with:
        useLocalCache: true

    - name: '⚙️ Ensure Rosetta 2'
      run: softwareupdate --install-rosetta --agree-to-license

    - name: '🚧 Configure with CMake (production, x86_64)'
      env:
        ARCGIS_API_KEY: ${{secrets.ARCGIS_API_KEY}}
        SERIAL_STUDIO_LICENSE_KEY: ${{secrets.SERIAL_STUDIO_LICENSE_KEY}}
        SERIAL_STUDIO_INSTANCE_ID: ${{secrets.SERIAL_STUDIO_INSTANCE_ID}}
      run: |
        cmake -B build \
          -DPRODUCTION_OPTIMIZATION=ON \
          -DENABLE_HARDENING=ON \
          -DENABLE_GRPC=ON \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
          -DCMAKE_OSX_ARCHITECTURES="x86_64" \
          -DCMAKE_PREFIX_PATH="${{github.workspace}}/grpc-prefix;${CMAKE_PREFIX_PATH}" \
          -DBUILD_COMMERCIAL=ON \
          -DBUILD_GPL3=OFF

    - name: '🚧 Build application (x86_64)'
      run: cmake --build build --config Release -j$(getconf _NPROCESSORS_ONLN)

    - name: '🚦 Hotpath throughput (x86_64 / Rosetta, informational)'
      continue-on-error: true
      env:
        QT_QPA_PLATFORM: offscreen
        DYLD_FRAMEWORK_PATH: ${{github.workspace}}/Qt-${{env.QT_VERSION_MACOS}}-${{runner.os}}-x64/${{env.QT_VERSION_MACOS}}/macos/lib
      run: |
        arch -x86_64 ./build/app/${{env.EXECUTABLE}}.app/Contents/MacOS/${{env.EXECUTABLE}} --headless --benchmark-hotpath --min-fps 256000

    - name: '📤 Upload artifact: x86_64 executable'
      run: cp "build/app/${{env.EXECUTABLE}}.app/Contents/MacOS/${{env.EXECUTABLE}}" "${{env.EXECUTABLE}}-x86_64"

    - name: '📤 Upload artifact: x86_64 slice'
      uses: actions/upload-artifact@v5
      with:
        name: macos-intel-exe
        path: ${{env.EXECUTABLE}}-x86_64
        retention-days: 1

#-------------------------------------------------------------------------------
# macOS universal merge + sign + notarize.
#-------------------------------------------------------------------------------

  build-macos:
    runs-on: macos-latest
    name: '🍎 macOS Build (universal)'
    needs:
      - build-macos-arm64
      - build-macos-intel
    permissions:
      contents: read
      security-events: write
    steps:
    - name: '🧰 Checkout'
      uses: actions/checkout@v5

    - name: '⚙️ Install Node'
      uses: actions/setup-node@v6
      with:
        node-version: 22

    - name: '📥 Download arm64 deployed .app'
      uses: actions/download-artifact@v5
      with:
        name: macos-arm64-app
        path: .

    - name: '📥 Download x86_64 slice'
      uses: actions/download-artifact@v5
      with:
        name: macos-intel-exe
        path: ./intel-slice

    - name: '🗜 Unpack deployed .app'
      run: tar -xzf macos-arm64-app.tar.gz

    - name: '🔗 Lipo arm64 + x86_64 into a universal binary'
      run: |
        APP_EXE="${{env.APPLICATION}}.app/Contents/MacOS/${{env.EXECUTABLE}}"
        X64_EXE="intel-slice/${{env.EXECUTABLE}}-x86_64"
        lipo -create "$APP_EXE" "$X64_EXE" -output "$APP_EXE.universal"
        mv "$APP_EXE.universal" "$APP_EXE"
        chmod +x "$APP_EXE"
        lipo -info "$APP_EXE"
        lipo -info "$APP_EXE" | grep -q "arm64" && lipo -info "$APP_EXE" | grep -q "x86_64"

    - name: '🔎 Scan binaries with deglyph'
      uses: deglyph-re/cli@main
      with:
        path: ${{env.APPLICATION}}.app/Contents/MacOS/${{env.EXECUTABLE}}
        sarif: deglyph.sarif
        fail-on: never
        cve: "true"

    - name: '🛡 Upload deglyph SARIF'
      if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: deglyph.sarif
        category: deglyph-macos

    - name: '🪪 Import Certificates'
      uses: apple-actions/import-codesign-certs@v6
      with:
        p12-file-base64: ${{secrets.APPLE_CERTIFICATES_P12}}
        p12-password: ${{secrets.APPLE_CERTIFICATES_P12_PASSWORD}}

    - name: '✍🏻 Sign Application with Entitlements'
      run: |
        codesign --force --deep --options runtime \
          --entitlements "${GITHUB_WORKSPACE}/app/deploy/macOS/Serial-Studio.entitlements" \
          --sign "${{secrets.APPLE_APPID_TEAM_ID}}" \
          "${{env.APPLICATION}}.app"

    - name: '💽 Create nice DMG'
      run: |
        npm install --global create-dmg
        rm LICENSE.md
        create-dmg "${{env.APPLICATION}}.app" --dmg-title="${{env.APPLICATION}}"
        mv "${{env.APPLICATION}} ${{env.VERSION}}.dmg" "${{env.EXECUTABLE}}-${{env.VERSION}}-macOS.dmg"

    - name: '📋 Notarize'
      shell: bash
      env:
        PRODUCT_PATH: ${{env.EXECUTABLE}}-${{env.VERSION}}-macOS.dmg
        APPLE_ID: ${{secrets.APPLE_NOTARIZATION_USERNAME}}
        APP_PASSWORD: ${{secrets.APPLE_NOTARIZATION_PASSWORD}}
        TEAM_ID: ${{secrets.APPLE_NOTARIZATION_TEAMID}}
      run: |
        echo "Submitting $PRODUCT_PATH for notarization..."
        xcrun notarytool submit "$PRODUCT_PATH" \
          --apple-id "$APPLE_ID" \
          --password "$APP_PASSWORD" \
          --team-id "$TEAM_ID" \
          --wait \
          --output-format json

    - name: '📌 Staple'
      shell: bash
      run: |
        PRODUCT="${{env.EXECUTABLE}}-${{env.VERSION}}-macOS.dmg"
        echo "Stapling $PRODUCT..."
        xcrun stapler staple "$PRODUCT"

    - name: '📤 Upload artifact: DMG'
      uses: actions/upload-artifact@v5
      with:
        name: ${{env.EXECUTABLE}}-${{env.VERSION}}-macOS.dmg
        path: ${{env.EXECUTABLE}}-${{env.VERSION}}-macOS.dmg

#-------------------------------------------------------------------------------
# Windows build (MSVC 2022 x86_64)
#-------------------------------------------------------------------------------

  build-windows:
    runs-on: windows-latest
    name: '🧊 Windows Build (x86_64)'
    permissions:
      contents: read
      security-events: write
    steps:
    - run: git config --global core.autocrlf input
    - name: '🧰 Checkout'
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: '⚙️ Restore Qt Cache'
      uses: actions/cache/restore@v5
      if: env.INSTALL_QT_WINDOWS == 'false'
      with:
        path: |
          ${{github.workspace}}/Qt-${{env.QT_VERSION_WINDOWS}}-${{runner.os}}-x64
          ${{env.USERPROFILE}}/.qt-license
        key: qt-${{runner.os}}-${{env.QT_VERSION_WINDOWS}}-x64-msvc2022_64

    - name: '⚙️ Install Qt'
      shell: pwsh
      if: env.INSTALL_QT_WINDOWS == 'true'
      env:
        QT_VERSION: ${{env.QT_VERSION_WINDOWS}}
        QT_ARCH: x64
        QT_USERNAME: ${{secrets.QT_USERNAME}}
        QT_PASSWORD: ${{secrets.QT_PASSWORD}}
        QT_OUTPUT_DIR: ${{github.workspace}}/Qt-${{env.QT_VERSION_WINDOWS}}-${{runner.os}}-x64
      run: |
        ./scripts/install-qt.ps1

    - name: '⚙️ Save Qt Cache'
      if: env.INSTALL_QT_WINDOWS == 'true'
      uses: actions/cache/save@v5
      with:
        path: |
          ${{github.workspace}}/Qt-${{env.QT_VERSION_WINDOWS}}-${{runner.os}}-x64
          ${{env.USERPROFILE}}/.qt-license
        key: qt-${{runner.os}}-${{env.QT_VERSION_WINDOWS}}-x64-msvc2022_64

    - name: '⚙️ Add Qt to PATH'
      shell: pwsh
      env:
        QT_VERSION: ${{env.QT_VERSION_WINDOWS}}
        QT_OUTPUT_DIR: ${{github.workspace}}/Qt-${{env.QT_VERSION_WINDOWS}}-${{runner.os}}-x64
      run: |
        $QT_BIN_PATH = "$env:QT_OUTPUT_DIR\$env:QT_VERSION\msvc2022_64\bin"
        $QT_LIBEXEC_PATH = "$env:QT_OUTPUT_DIR\$env:QT_VERSION\msvc2022_64\libexec"
        $CMAKE_PREFIX_PATH = "$env:QT_OUTPUT_DIR\$env:QT_VERSION\msvc2022_64\lib\cmake"

        Write-Output "$QT_BIN_PATH" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        Write-Output "$QT_LIBEXEC_PATH" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        Write-Output "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH" >> $env:GITHUB_ENV

    - name: '⚙️ Install CMake'
      uses: lukka/get-cmake@latest
      with:
        useLocalCache: false
        useCloudCache: false

    - name: '🛠 Setup MSVC Development Environment'
      uses: TheMrMilchmann/setup-msvc-dev@v4
      with:
        arch: x64

    - name: '🛠 Use Microsoft (VS-bundled) clang-cl'
      run: |
        $clangDir = Join-Path $env:VCINSTALLDIR 'Tools\Llvm\x64\bin'
        if (-not (Test-Path (Join-Path $clangDir 'clang-cl.exe'))) { throw "VS clang-cl not found at $clangDir" }
        Add-Content -Path $env:GITHUB_PATH -Value $clangDir
        & (Join-Path $clangDir 'clang-cl.exe') --version

    - name: '⚙️ Download prebuilt gRPC'
      run: |
        gh release download v${{env.GRPC_VERSION}} `
          -R ${{env.GRPC_REPO}} `
          -p "grpc-${{env.GRPC_VERSION}}-windows-x86_64.zip"
        mkdir "${{github.workspace}}\grpc-prefix"
        7z x grpc-${{env.GRPC_VERSION}}-windows-x86_64.zip -o"${{github.workspace}}\grpc-prefix"
      env:
        GH_TOKEN: ${{secrets.GITHUB_TOKEN}}

    - name: '🚧 Configure with CMake (PGO generate)'
      env:
        ARCGIS_API_KEY: ${{secrets.ARCGIS_API_KEY}}
        SERIAL_STUDIO_LICENSE_KEY: ${{secrets.SERIAL_STUDIO_LICENSE_KEY}}
        SERIAL_STUDIO_INSTANCE_ID: ${{secrets.SERIAL_STUDIO_INSTANCE_ID}}
      run: |
        cmake -B build -G Ninja `
          -DCMAKE_CXX_COMPILER=clang-cl `
          -DCMAKE_C_COMPILER=clang-cl `
          -DCMAKE_PREFIX_PATH="${{github.workspace}}/grpc-prefix" `
          -DPRODUCTION_OPTIMIZATION=ON `
          -DENABLE_HARDENING=ON `
          -DENABLE_GRPC=ON `
          -DENABLE_PGO=ON `
          -DPGO_STAGE=GENERATE `
          -DCMAKE_BUILD_TYPE=Release `
          -DBUILD_COMMERCIAL=ON `
          -DBUILD_GPL3=OFF

    - name: '🚧 Build application (instrumented)'
      run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

    - name: '🏋️ PGO training run (hotpath)'
      run: |
        $p = Start-Process -FilePath "build/app/${{env.EXECUTABLE}}.exe" `
          -ArgumentList '--headless','--benchmark-hotpath','--min-fps','1' `
          -WorkingDirectory $PWD -PassThru -NoNewWindow
        if (-not $p.WaitForExit(300000)) { $p.Kill(); throw 'benchmark timed out (no PGO profile)' }

    - name: '🚧 Reconfigure with CMake (PGO use)'
      env:
        ARCGIS_API_KEY: ${{secrets.ARCGIS_API_KEY}}
        SERIAL_STUDIO_LICENSE_KEY: ${{secrets.SERIAL_STUDIO_LICENSE_KEY}}
        SERIAL_STUDIO_INSTANCE_ID: ${{secrets.SERIAL_STUDIO_INSTANCE_ID}}
      run: |
        cmake -B build -G Ninja `
          -DCMAKE_CXX_COMPILER=clang-cl `
          -DCMAKE_C_COMPILER=clang-cl `
          -DCMAKE_PREFIX_PATH="${{github.workspace}}/grpc-prefix" `
          -DPRODUCTION_OPTIMIZATION=ON `
          -DENABLE_HARDENING=ON `
          -DENABLE_GRPC=ON `
          -DENABLE_PGO=ON `
          -DPGO_STAGE=USE `
          -DCMAKE_BUILD_TYPE=Release `
          -DBUILD_COMMERCIAL=ON `
          -DBUILD_GPL3=OFF

    - name: '🚧 Build application (PGO optimized)'
      run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

    - name: '🚦 Hotpath throughput (Windows, informational)'
      continue-on-error: true
      run: |
        $p = Start-Process -FilePath "build/app/${{env.EXECUTABLE}}.exe" `
          -ArgumentList '--headless','--benchmark-hotpath','--min-fps','256000' `
          -WorkingDirectory $PWD -PassThru -NoNewWindow
        if (-not $p.WaitForExit(300000)) { $p.Kill() }
        if (Select-String -Path benchmark.txt -Pattern 'HOTPATH_PASS=1' -Quiet) { exit 0 } else { exit 1 }

    - name: '🔎 Scan binaries with deglyph'
      uses: deglyph-re/cli@main
      with:
        path: build/app/${{env.EXECUTABLE}}.exe
        sarif: deglyph.sarif
        fail-on: never
        cve: "true"

    - name: '🛡 Upload deglyph SARIF'
      if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: deglyph.sarif
        category: deglyph-windows

    - name: '⚙️ Add msbuild to PATH'
      uses: microsoft/setup-msbuild@v3

    - name: '⚙️ Install WiX'
      run: dotnet tool install --global wix

    - name: '📦 Create MSI installer'
      run: |
        cd build
        cpack --verbose
        mv *.msi ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows.msi
        mv ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows.msi ../

    - name: '📦 Create portable TGZ'
      run: |
        cd build
        cpack -G TGZ
        mv *.tar.gz ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows.tgz

    - name: '📦 Extract TGZ contents'
      shell: bash
      run: |
        cd build
        7z x ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows.tgz
        7z x ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows.tar
        DIRNAME=$(tar -tf ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows.tar 2>/dev/null | head -1 | cut -f1 -d"/" || true)
        echo $DIRNAME > dirname.txt
        cp ../app/deploy/windows/license.rtf ./License.rtf

    - name: '🧩 Bundle offscreen platform plugin (headless CI tests)'
      shell: bash
      run: |
        cd build
        DIRNAME=$(cat dirname.txt)
        QT_PLUGINS_PATH="${{github.workspace}}/Qt-${{env.QT_VERSION_WINDOWS}}-${{runner.os}}-x64/${{env.QT_VERSION_WINDOWS}}/msvc2022_64/plugins"
        DEST="$DIRNAME/bin/platforms"
        mkdir -p "$DEST"
        if [ -f "$QT_PLUGINS_PATH/platforms/qoffscreen.dll" ]; then
          cp "$QT_PLUGINS_PATH/platforms/qoffscreen.dll" "$DEST/"
        else
          echo "Warning: offscreen platform plugin not found at $QT_PLUGINS_PATH/platforms"
        fi

    - name: '📝 Create Windows batch launcher'
      shell: bash
      run: |
        cd build
        DIRNAME=$(cat dirname.txt)
        echo "@echo off" > "${{env.APPLICATION}}.bat"
        echo "start \"\" \"%~dp0${DIRNAME}\\bin\\${{env.EXECUTABLE}}.exe\"" >> "${{env.APPLICATION}}.bat"

    - name: '📦 Add files to ZIP'
      shell: bash
      run: |
        cd build
        DIRNAME=$(cat dirname.txt)
        7z a ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows-Portable.zip "${{env.APPLICATION}}.bat" License.rtf $DIRNAME/*
        mv ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows-Portable.zip ..

    - name: '📤 Upload artifact: MSI installer'
      uses: actions/upload-artifact@v5
      with:
        name: ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows.msi
        path: ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows.msi

    - name: '📤 Upload artifact: Portable ZIP'
      uses: actions/upload-artifact@v5
      with:
       name: ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows-Portable
       path: ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows-Portable.zip

#-------------------------------------------------------------------------------
# Create release
#-------------------------------------------------------------------------------

  upload:
    name: '🗂 Publish (continuous)'
    needs:
      - build-macos
      - build-linux
      - build-windows
      - build-linux-arm64

    permissions:
      contents: write

    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.ref_name || 'continuous' }}

    steps:
      - name: '🧰 Checkout'
        uses: actions/checkout@v5

      - name: '📥 Download artifacts'
        uses: actions/download-artifact@v5
        with:
          path: ./artifacts
          merge-multiple: true

      - name: '🗑️ Delete previous release and tag if exists'
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release '$RELEASE_TAG' exists. Deleting..."
            gh release delete "$RELEASE_TAG" --cleanup-tag --yes --repo "$GITHUB_REPOSITORY" || echo "Failed to delete release. Ignoring."
          else
            echo "No release named '$RELEASE_TAG' found. Skipping delete."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: '🚀 Create Release'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.RELEASE_TAG }}
          commit: ${{ github.sha }}
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          name: 'Continuous Build'
          artifacts: |
            artifacts/*.AppImage
            artifacts/*.dmg
            artifacts/*.msi
            artifacts/*.zip

#-------------------------------------------------------------------------------
# Static analysis (fail-fast, no build)
#-------------------------------------------------------------------------------

  lint:
    runs-on: ubuntu-24.04
    name: '🔬 Lint'
    steps:
    - name: '🧰 Checkout'
      uses: actions/checkout@v5

    - name: '🐍 Set up Python'
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: '🐍 Install Python dependencies'
      run: pip install -r tests/requirements.txt

    - name: '🔬 Verify code conventions'
      run: python3 scripts/code-verify.py --check

    - name: '📤 Upload code-verify report'
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: code-verify-report
        path: .code-report
        if-no-files-found: ignore

#-------------------------------------------------------------------------------
# Integration tests
#-------------------------------------------------------------------------------

  test:
    name: '🧪 Test (${{ matrix.label }})'
    needs: [upload]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux
            os: linux
            runs-on: ubuntu-24.04
            asset: Linux-x64.AppImage
            broker: true
            marker_expr: "not destructive and not dos and not audio"
          - label: Linux-arm64
            os: linux
            runs-on: ubuntu-24.04-arm
            asset: Linux-arm64.AppImage
            broker: true
            marker_expr: "not destructive and not dos and not audio"
          - label: macOS
            os: macos
            runs-on: macos-latest
            asset: macOS.dmg
            broker: true
            marker_expr: "not destructive and not dos and not audio"
          - label: Windows
            os: windows
            runs-on: windows-latest
            asset: Windows-Portable
            broker: false
            marker_expr: "not destructive and not dos and not audio and not requires_broker"
    runs-on: ${{ matrix.runs-on }}
    defaults:
      run:
        shell: bash
    steps:
    - name: '🧰 Checkout'
      uses: actions/checkout@v5

    - name: '🧮 Resolve artifact name'
      run: |
        echo "ARTIFACT=${{env.EXECUTABLE}}-${{env.VERSION}}-${{matrix.asset}}" >> "$GITHUB_ENV"
        echo "RELEASE_TAG=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.ref_name || 'continuous' }}" >> "$GITHUB_ENV"

    - name: '🐍 Set up Python'
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: '🐍 Install Python dependencies'
      run: pip install -r tests/requirements.txt

    - name: '📥 Download released binary'
      env:
        GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
      run: |
        case "${{matrix.os}}" in
          windows) PATTERN="${ARTIFACT}.zip" ;;
          *)       PATTERN="$ARTIFACT" ;;
        esac
        gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
          --pattern "$PATTERN" --clobber

    - name: '📦 Prepare binary (Linux AppImage)'
      if: matrix.os == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1 libgl1 libopengl0 libasound2-dev fontconfig \
          mosquitto mosquitto-clients alsa-utils
        chmod +x "$ARTIFACT"
        ./"$ARTIFACT" --appimage-extract >/dev/null
        echo "SS_RUN=$PWD/squashfs-root/AppRun" >> "$GITHUB_ENV"

    - name: '📦 Prepare binary (macOS .app)'
      if: matrix.os == 'macos'
      run: |
        hdiutil attach "$ARTIFACT" -nobrowse -mountpoint /tmp/ssdmg
        cp -R "/tmp/ssdmg/${{env.APPLICATION}}.app" .
        hdiutil detach /tmp/ssdmg
        echo "SS_RUN=$PWD/${{env.APPLICATION}}.app/Contents/MacOS/${{env.EXECUTABLE}}" >> "$GITHUB_ENV"

    - name: '📦 Prepare binary (Windows portable)'
      if: matrix.os == 'windows'
      run: |
        7z x "${ARTIFACT}.zip" -oapp_win >/dev/null
        EXE=$(find app_win -name "${{env.EXECUTABLE}}.exe" | head -1)
        echo "SS_RUN=$PWD/$EXE" >> "$GITHUB_ENV"

    - name: '🦟 Start Mosquitto (Linux)'
      if: matrix.os == 'linux'
      run: |
        sudo systemctl stop mosquitto || true
        printf 'listener 1883 127.0.0.1\nallow_anonymous true\npersistence false\n' > /tmp/mosq.conf
        mosquitto -d -c /tmp/mosq.conf
        for i in $(seq 1 15); do (echo > /dev/tcp/127.0.0.1/1883) >/dev/null 2>&1 && break; sleep 1; done

    - name: '🦟 Start Mosquitto (macOS)'
      if: matrix.os == 'macos'
      run: |
        brew install mosquitto
        printf 'listener 1883 127.0.0.1\nallow_anonymous true\npersistence false\n' > /tmp/mosq.conf
        "$(brew --prefix mosquitto)/sbin/mosquitto" -d -c /tmp/mosq.conf
        for i in $(seq 1 15); do (echo > /dev/tcp/127.0.0.1/1883) >/dev/null 2>&1 && break; sleep 1; done

    - name: '🎙 Set up ALSA loopback (Linux)'
      if: matrix.os == 'linux'
      run: |
        sudo apt-get install -y "linux-modules-extra-$(uname -r)" || true
        sudo modprobe snd-aloop || true
        aplay -l || true

    - name: '🔑 Activate Serial Studio license'
      env:
        QT_QPA_PLATFORM: offscreen
      run: '"$SS_RUN" --activate "${{secrets.SERIAL_STUDIO_LICENSE_KEY}}"'

    - name: '🚀 Start Serial Studio (headless)'
      env:
        QT_QPA_PLATFORM: offscreen
      run: |
        "$SS_RUN" --headless --api-server &
        echo $! > ss_pid.txt
        for i in $(seq 1 30); do
          (echo > /dev/tcp/127.0.0.1/7777) >/dev/null 2>&1 && { echo "API server ready ($i)"; break; }
          sleep 1
        done

    - name: '🧪 Run tests'
      continue-on-error: ${{ env.REQUIRE_TESTS_TO_PUBLISH != 'true' }}
      env:
        # Force UTF-8 stdio so non-ASCII parser-script content (e.g. the U+2192
        # arrow in comments) survives the subprocess boundary on the cp1252
        # Windows runners instead of raising UnicodeEncodeError.
        PYTHONIOENCODING: utf-8
        PYTHONUTF8: '1'
      run: |
        # Tests carrying @pytest.mark.flaky retry their own transient connect
        # flakes; everything else fails on the first run. We deliberately do NOT
        # blanket-rerun, so a hard app crash fails fast instead of re-running the
        # whole suite against a dead instance.
        pytest tests/ \
          -m "${{ matrix.marker_expr }}" \
          -v --tb=short --timeout=60 --junit-xml=test-results.xml

    - name: '🎙 Run audio loopback tests (Linux, non-blocking)'
      if: matrix.os == 'linux'
      continue-on-error: true
      env:
        QT_QPA_PLATFORM: offscreen
        SS_AUDIO_LOOPBACK_PLAYBACK: plughw:Loopback,1,0
        SS_AUDIO_CAPTURE_MATCH: loopback
      run: |
        pytest tests/integration/test_audio_loopback.py \
          -m audio -v --tb=short --timeout=120 --junit-xml=audio-test-results.xml

    - name: '🔑 Deactivate Serial Studio license'
      if: always()
      env:
        QT_QPA_PLATFORM: offscreen
      run: '"$SS_RUN" --deactivate || true'

    - name: '🛑 Stop Serial Studio'
      if: always()
      run: '[ -f ss_pid.txt ] && kill $(cat ss_pid.txt) || true'

    - name: '🦟 Stop Mosquitto'
      if: always() && matrix.broker
      run: pkill -f "mosquitto -d -c /tmp/mosq.conf" || true

    - name: '📤 Upload test results'
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: pytest-results-${{ matrix.label }}
        path: |
          test-results.xml
          audio-test-results.xml
          tests/**/*.log
