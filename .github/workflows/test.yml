#-------------------------------------------------------------------------------
# Workflow configuration
#-------------------------------------------------------------------------------

name: Tests

on:
  push:               # Run on push
    paths-ignore:     # File patterns to ignore
    - '**.md'         # Ignore changes to *.md files

  pull_request:       # Run on pull-request
    paths-ignore:     # File patterns to ignore
    - '**.md'         # Ignore changes to *.md files

#-------------------------------------------------------------------------------
# Define application name & version
#-------------------------------------------------------------------------------

env:
  QT_VERSION_LINUX: 6.11.0
  UNIXNAME: "serial-studio-pro"
  INSTALL_QT_LINUX_INTEL: true
  QTFRAMEWORK_BYPASS_LICENSE_CHECK: "true"

#-------------------------------------------------------------------------------
# Begin workflow jobs definition
#-------------------------------------------------------------------------------

jobs:

#-------------------------------------------------------------------------------
# Integration & script test job (Linux x86_64, headless)
#-------------------------------------------------------------------------------

  test-linux:
    runs-on: ubuntu-24.04
    name: '🧪 Tests (Linux)'
    steps:
    - name: '🧰 Checkout'
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: '⚙️ Install dependencies'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          fakeroot \
          libcups2-dev \
          libegl1 \
          libgl1-mesa-dev \
          libasound2-dev \
          libssl-dev \
          libudev-dev \
          libzstd-dev \
          zlib1g-dev \
          libexpat1-dev \
          libxcb1 \
          libxcb-cursor0 \
          libxcb-cursor-dev \
          libxcb-glx0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-image0-dev \
          libxcb-keysyms1 \
          libxcb-randr0 \
          libxcb-render0 \
          libxcb-render-util0 \
          libxcb-shape0 \
          libxcb-shm0 \
          libxcb-sync1 \
          libxcb-util0-dev \
          libxcb-util1 \
          libxcb-xfixes0 \
          libxcb-xinerama0 \
          libxcb-xkb-dev \
          libxcb-xtest0 \
          libxkbcommon-dev \
          libxkbcommon-x11-0 \
          libxkbcommon-x11-dev \
          nodejs \
          npm \
    - name: '⚙️ Download prebuilt gRPC'
      run: |
        gh release download v1.78.1 \
          -R alex-spataru/gRPC-Builds \
          -p "grpc-1.78.1-linux-x86_64.tar.gz"
        mkdir -p ${{github.workspace}}/grpc-prefix
        tar -xzf grpc-1.78.1-linux-x86_64.tar.gz -C ${{github.workspace}}/grpc-prefix
      env:
        GH_TOKEN: ${{secrets.GITHUB_TOKEN}}

    - name: '⚙️ Restore Qt Cache'
      uses: actions/cache/restore@v5
      if: env.INSTALL_QT_LINUX_INTEL == 'false'
      with:
        path: |
          ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64
          ${{env.USERPROFILE}}/.qt-license
        key: qt-${{runner.os}}-${{env.QT_VERSION_LINUX}}-x64

    - name: '⚙️ Install Qt'
      shell: bash
      if: env.INSTALL_QT_LINUX_INTEL == 'true'
      env:
        QT_VERSION: ${{env.QT_VERSION_LINUX}}
        QT_ARCH: x64
        QT_USERNAME: ${{secrets.QT_USERNAME}}
        QT_PASSWORD: ${{secrets.QT_PASSWORD}}
        QT_OUTPUT_DIR: ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64
      run: |
        chmod +x ./scripts/install-qt.sh
        ./scripts/install-qt.sh

    - name: '⚙️ Save Qt Cache'
      if: env.INSTALL_QT_LINUX_INTEL == 'true'
      uses: actions/cache/save@v5
      with:
        path: |
          ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64
          ${{env.USERPROFILE}}/.qt-license
        key: qt-${{runner.os}}-${{env.QT_VERSION_LINUX}}-x64

    - name: '⚙️ Add Qt to PATH'
      shell: bash
      env:
        QT_VERSION: ${{env.QT_VERSION_LINUX}}
        QT_OUTPUT_DIR: ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64
      run: |
        export QT_BIN_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/gcc_64/bin"
        export QT_LIBEXEC_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/gcc_64/libexec"
        export CMAKE_PREFIX_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/gcc_64/lib/cmake"

        echo "$QT_BIN_PATH" >> $GITHUB_PATH
        echo "$QT_LIBEXEC_PATH" >> $GITHUB_PATH
        echo "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH" >> $GITHUB_ENV

    - name: '⚙️ Install CMake'
      uses: lukka/get-cmake@latest
      with:
        useLocalCache: true

    - name: '🚧 Configure with CMake'
      env:
        ARCGIS_API_KEY: ${{secrets.ARCGIS_API_KEY}}
        SERIAL_STUDIO_LICENSE_KEY: ${{secrets.SERIAL_STUDIO_LICENSE_KEY}}
        SERIAL_STUDIO_INSTANCE_ID: ${{secrets.SERIAL_STUDIO_INSTANCE_ID}}
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DPRODUCTION_OPTIMIZATION=ON \
          -DENABLE_HARDENING=ON \
          -DENABLE_GRPC=ON \
          -DUSE_SYSTEM_ZLIB=ON \
          -DUSE_SYSTEM_EXPAT=ON \
          -DCMAKE_PREFIX_PATH="${{github.workspace}}/grpc-prefix;${CMAKE_PREFIX_PATH}" \
          -DBUILD_COMMERCIAL=ON \
          -DBUILD_GPL3=OFF

    - name: '🚧 Build application'
      run: cmake --build build --config Release -j$(nproc)

    - name: '🐍 Set up Python'
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: '🐍 Install Python dependencies'
      run: pip install -r tests/requirements.txt

    - name: '🔑 Activate Serial Studio license'
      env:
        QT_QPA_PLATFORM: offscreen
        LD_LIBRARY_PATH: >-
          ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64/${{env.QT_VERSION_LINUX}}/gcc_64/lib
      run: |
        ./build/app/${{env.UNIXNAME}} --activate "${{secrets.SERIAL_STUDIO_LICENSE_KEY}}"

    - name: '🚀 Start Serial Studio (headless)'
      env:
        QT_QPA_PLATFORM: offscreen
        LD_LIBRARY_PATH: >-
          ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64/${{env.QT_VERSION_LINUX}}/gcc_64/lib
      run: |
        ./build/app/${{env.UNIXNAME}} --headless --api-server &
        echo $! > ss_pid.txt

        # Wait for the API server to accept connections on port 7777
        for i in $(seq 1 30); do
          if nc -z 127.0.0.1 7777 2>/dev/null; then
            echo "API server is ready (attempt $i)"
            break
          fi
          sleep 1
        done

    - name: '🧪 Run tests'
      continue-on-error: true
      run: |
        pytest tests/ \
          -m "not destructive and not dos" \
          -v \
          --tb=short \
          --timeout=60 \
          --junit-xml=test-results.xml

    - name: '🔑 Deactivate Serial Studio license'
      if: always()
      env:
        QT_QPA_PLATFORM: offscreen
        LD_LIBRARY_PATH: >-
          ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64/${{env.QT_VERSION_LINUX}}/gcc_64/lib
      run: |
        ./build/app/${{env.UNIXNAME}} --deactivate || true

    - name: '🛑 Stop Serial Studio'
      if: always()
      run: |
        if [ -f ss_pid.txt ]; then
          kill $(cat ss_pid.txt) || true
        fi

    - name: '📤 Upload test results'
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: pytest-results
        path: |
          test-results.xml
          tests/**/*.log
